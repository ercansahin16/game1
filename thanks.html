<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teşekkürler & Lisans</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 15px;
  }
  .container {
    max-width: 500px;
    width: 100%;
    background: white;
    padding: 30px 25px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    animation: slideUp 0.5s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  h1 {
    color: #333;
    margin-bottom: 15px;
    font-size: 1.8rem;
  }
  p {
    color: #666;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  input {
    width: 100%;
    padding: 12px 15px;
    margin: 8px 0 15px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 15px;
    transition: border 0.3s;
  }
  input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 2px rgba(102,126,234,0.1);
  }
  button {
    width: 100%;
    padding: 14px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.3s, transform 0.2s;
    margin-top: 5px;
  }
  button:hover {
    background: #5a67d8;
    transform: translateY(-2px);
  }
  button:disabled {
    background: #a0aec0;
    cursor: not-allowed;
    transform: none;
  }
  .error {
    color: #e53e3e;
    font-size: 0.85rem;
    margin: -10px 0 10px;
    display: none;
    text-align: left;
  }
  #license {
    background: #f7fafc;
    border: 1px dashed #667eea;
    padding: 15px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 1.2rem;
    margin: 20px 0;
    word-break: break-all;
    color: #2d3748;
  }
  .copy-btn {
    background: #48bb78;
    margin-top: 0;
  }
  .copy-btn:hover {
    background: #38a169;
  }
  .link {
    display: inline-block;
    margin-top: 20px;
    color: #667eea;
    text-decoration: none;
    font-weight: 500;
  }
  .link:hover {
    text-decoration: underline;
  }
  /* Responsive */
  @media (max-width: 480px) {
    .container { padding: 20px 15px; }
    h1 { font-size: 1.5rem; }
    input { padding: 10px 12px; }
    button { padding: 12px; }
  }
</style>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCloL8IN0NpHQBxFjaRH_62vOEWjLQjr4o",
  authDomain: "duapro-a7d7e.firebaseapp.com",
  projectId: "duapro-a7d7e",
  storageBucket: "duapro-a7d7e.appspot.com",
  messagingSenderId: "450775848659",
  appId: "1:450775848659:web:ca192a401da3f887e1e626"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const generateKey = () => 'GAME-' + Math.random().toString(36).substring(2,10).toUpperCase();

window.generateLicense = async () => {
  // Alanları al
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('emailInput').value.trim();
  
  // Hata mesajlarını sıfırla
  document.querySelectorAll('.error').forEach(el => el.style.display = 'none');
  
  let hasError = false;
  if (!firstName) {
    document.getElementById('firstNameError').style.display = 'block';
    hasError = true;
  }
  if (!lastName) {
    document.getElementById('lastNameError').style.display = 'block';
    hasError = true;
  }
  if (!phone) {
    document.getElementById('phoneError').style.display = 'block';
    hasError = true;
  }
  if (!email) {
    document.getElementById('emailError').style.display = 'block';
    hasError = true;
  }
  
  if (hasError) return;
  
  const key = generateKey();
  document.getElementById('license').innerText = 'Oluşturuluyor...';
  
  try {
    await addDoc(collection(db, "licenses"), { 
      key: key,
      firstName: firstName,
      lastName: lastName,
      phone: phone,
      email: email,
      used: false,
      createdAt: new Date()
    });
    document.getElementById('license').innerText = key;
    document.getElementById('generateBtn').disabled = true;
    document.getElementById('generateBtn').style.opacity = '0.5';
  } catch(e) {
    console.error("Anahtar kaydedilemedi:", e);
    document.getElementById('license').innerText = "Hata! Anahtar oluşturulamadı.";
  }
}

// Kopyalama fonksiyonu (güvenilir)
window.copyKey = () => {
  const licenseText = document.getElementById('license').innerText;
  if (!licenseText || licenseText === 'Oluşturuluyor...' || licenseText.includes('Hata')) {
    alert('Önce anahtar oluşturun!');
    return;
  }
  
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(licenseText).then(() => {
      alert("Anahtar panoya kopyalandı!");
    }).catch(() => fallbackCopy(licenseText));
  } else {
    fallbackCopy(licenseText);
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  textarea.setSelectionRange(0, 99999);
  
  try {
    const successful = document.execCommand('copy');
    alert(successful ? 'Anahtar kopyalandı!' : 'Kopyalama başarısız.');
  } catch (err) {
    alert('Kopyalama başarısız. Lütfen manuel kopyalayın.');
  }
  
  document.body.removeChild(textarea);
}
</script>
</head>
<body>
<div class="container">
  <h1>🎉 Teşekkürler!</h1>
  <p>Lisans anahtarınızı oluşturmak için bilgilerinizi girin:</p>
  
  <input type="text" id="firstName" placeholder="Adınız" required>
  <div id="firstNameError" class="error">Ad alanı zorunludur.</div>
  
  <input type="text" id="lastName" placeholder="Soyadınız" required>
  <div id="lastNameError" class="error">Soyad alanı zorunludur.</div>
  
  <input type="tel" id="phone" placeholder="Telefon numaranız" required>
  <div id="phoneError" class="error">Telefon alanı zorunludur.</div>
  
  <input type="email" id="emailInput" placeholder="Email adresiniz" required>
  <div id="emailError" class="error">Email alanı zorunludur.</div>
  
  <button id="generateBtn" onclick="generateLicense()">Anahtar Oluştur</button>
  
  <div id="license"></div>
  
  <button class="copy-btn" onclick="copyKey()">📋 Anahtarı Kopyala</button>
  
  <p style="margin-top: 20px;">Bu anahtarı oyun açarken kullanacaksınız.</p>
  <a href="index.html" class="link">← Oyuna Git</a>
</div>
</body>
</html>
