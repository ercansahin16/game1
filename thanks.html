<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nevafil Lisans Oluşturma</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root {
--autumn-gold: #b38b43;
--autumn-leaf: #d35400;
--autumn-leaf-light: #f39c12;
--navy-deep: #0a192f;
--spiritual-bg: #fdfaf5;
--text-main: #34495e;
--glass-white: rgba(255, 255, 255, 0.9);
--border-gold: rgba(179, 139, 67, 0.3);
--transition-smooth: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: 'Quicksand', sans-serif;
background: var(--spiritual-bg);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 1.5rem;
color: var(--text-main);
position: relative;
}

/* Arka plan efekti */
body::before {
content: "";
position: fixed;
inset: 0;
background:
radial-gradient(circle at 15% 15%, rgba(179, 139, 67, 0.1) 0%, transparent 35%),
radial-gradient(circle at 85% 85%, rgba(10, 25, 47, 0.04) 0%, transparent 35%);
z-index: -1;
animation: pulseBg 12s ease-in-out infinite alternate;
}

@keyframes pulseBg {
0% { transform: scale(1); opacity: 0.8; }
100% { transform: scale(1.08); opacity: 1; }
}

.container {
max-width: 640px;
width: 100%;
background: var(--glass-white);
border-radius: 35px;
border: 1px solid var(--border-gold);
box-shadow: 0 25px 80px rgba(179, 139, 67, 0.06), inset 0 0 20px rgba(255, 255, 255, 0.5);
padding: 2.5rem;
transition: transform 0.2s ease;
position: relative;
overflow: visible;
}

/* Dekoratif köşe elementleri */
.container::before, .container::after {
content: "";
position: absolute;
width: 40px;
height: 40px;
background-size: contain;
background-repeat: no-repeat;
opacity: 0.5;
z-index: 10;
}

.container::before {
top: 20px;
left: 20px;
background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><g fill="%23b38b43" fill-opacity="0.6"><path d="M0 0 L10 10 L20 0 L10 20 L0 10 Z M10 10 L15 15 L20 10 Z"/></g></svg>');
}

.container::after {
bottom: 20px;
right: 20px;
background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><g fill="%23b38b43" fill-opacity="0.6"><path d="M100 100 L90 90 L80 100 L90 80 L100 90 Z M90 90 L85 85 L80 90 Z"/></g></svg>');
}

/* Başlık kısmı */
h1 {
font-family: 'Cinzel', serif;
font-size: 1.6rem;
font-weight: 700;
letter-spacing: 3px;
color: var(--navy-deep);
margin-bottom: 0.5rem;
text-align: center;
}

.nevafil {
color: var(--autumn-gold);
font-weight: 700;
position: relative;
}

.nevafil::after {
content: "✦";
position: absolute;
bottom: -8px;
left: 50%;
transform: translateX(-50%);
color: var(--autumn-gold);
font-size: 8px;
opacity: 0.7;
}

.thanks-sub {
font-family: 'Playfair Display', serif;
font-style: italic;
font-size: 0.9rem;
color: var(--text-main);
margin-bottom: 2rem;
border-left: 3px solid var(--autumn-gold);
padding-left: 1rem;
background: rgba(179, 139, 67, 0.05);
border-radius: 0 12px 12px 0;
line-height: 1.5;
opacity: 0.8;
}

/* Form grid: iki sütun */
.form-row {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 1rem;
margin-bottom: 1rem;
}

.input-group {
display: flex;
flex-direction: column;
gap: 0.3rem;
}

.input-group label {
font-size: 0.75rem;
font-weight: 600;
color: var(--navy-deep);
letter-spacing: 1px;
margin-left: 0.25rem;
text-transform: uppercase;
opacity: 0.8;
}

.input-group input {
width: 100%;
padding: 0.8rem 1rem;
font-size: 0.9rem;
border: 1.5px solid rgba(0, 0, 0, 0.08);
border-radius: 18px;
background: rgba(255, 255, 255, 0.7);
transition: var(--transition-smooth);
font-family: 'Quicksand', sans-serif;
color: var(--navy-deep);
}

.input-group input:focus {
outline: none;
border-color: var(--autumn-gold);
background: #fff;
transform: translateY(-2px);
box-shadow: 0 10px 30px rgba(179, 139, 67, 0.12);
}

.input-group input::placeholder {
color: #94a3b8;
font-weight: 300;
font-size: 0.85rem;
}

/* email satırı tam genişlik */
.full-width {
grid-column: span 2;
}

.error {
color: var(--autumn-leaf);
font-size: 0.7rem;
font-weight: 500;
margin-top: 0.2rem;
margin-left: 0.25rem;
display: none;
}

button {
border: none;
cursor: pointer;
font-weight: 600;
font-size: 0.9rem;
border-radius: 18px;
transition: var(--transition-smooth);
font-family: 'Quicksand', sans-serif;
letter-spacing: 1px;
}

#generateBtn {
background: var(--navy-deep);
color: white;
padding: 1rem 1.5rem;
width: 100%;
margin: 1.5rem 0 1.5rem;
box-shadow: 0 10px 20px rgba(10, 25, 47, 0.15);
font-size: 0.9rem;
}

#generateBtn:hover:not(:disabled) {
background: #142a4a;
transform: translateY(-3px);
box-shadow: 0 15px 30px rgba(10, 25, 47, 0.25);
}

#generateBtn:disabled {
background: #94a3b8;
box-shadow: none;
cursor: not-allowed;
opacity: 0.6;
}

/* güven rozeti */
.trust-badge {
display: flex;
align-items: center;
justify-content: center;
gap: 2rem;
margin: 1.5rem 0 0.5rem;
padding: 0.75rem 0;
border-top: 1px solid var(--border-gold);
border-bottom: 1px solid var(--border-gold);
background: rgba(179, 139, 67, 0.05);
border-radius: 40px;
}

.trust-badge span {
font-size: 0.75rem;
color: var(--text-main);
font-weight: 500;
display: flex;
align-items: center;
gap: 0.3rem;
font-family: 'Quicksand', sans-serif;
}

.trust-badge i {
color: var(--autumn-gold);
font-size: 0.9rem;
}

/* Ses butonu */
#soundToggle {
position: fixed;
bottom: 20px;
right: 20px;
background: rgba(255, 255, 255, 0.8);
border: 1px solid var(--border-gold);
width: 40px;
height: 40px;
border-radius: 50%;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 16px;
z-index: 1000;
transition: 0.3s;
box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

#soundToggle:hover {
transform: scale(1.1);
}

#soundToggle.error {
background: rgba(211, 84, 0, 0.1);
border-color: var(--autumn-leaf);
}

/* SweetAlert2 Özel Stilleri */
.swal2-popup {
font-family: 'Quicksand', sans-serif !important;
font-size: 0.85rem !important;
border-radius: 20px !important;
border: 1px solid var(--border-gold) !important;
background: var(--glass-white) !important;
backdrop-filter: blur(12px) !important;
box-shadow: 0 25px 80px rgba(179, 139, 67, 0.15) !important;
}

.swal2-title {
font-family: 'Cinzel', serif !important;
font-size: 1.2rem !important;
color: var(--navy-deep) !important;
letter-spacing: 2px !important;
}

.swal2-confirm {
background: var(--navy-deep) !important;
border-radius: 14px !important;
font-size: 0.8rem !important;
padding: 10px 20px !important;
font-weight: 600 !important;
letter-spacing: 1px !important;
}

.swal2-confirm:hover {
background: #142a4a !important;
transform: translateY(-2px) !important;
}

/* responsive */
@media (max-width: 500px) {
.form-row {
grid-template-columns: 1fr;
gap: 0.75rem;
}
.full-width {
grid-column: span 1;
}
.container { 
padding: 1.5rem; 
border-radius: 30px;
}
.container::before, .container::after { 
width: 30px; 
height: 30px; 
opacity: 0.3; 
}
h1 { font-size: 1.3rem; letter-spacing: 2px; }
.thanks-sub { font-size: 0.85rem; }
.trust-badge { 
flex-direction: column; 
gap: 0.5rem; 
align-items: start; 
padding-left: 1rem; 
border-radius: 20px;
}
#soundToggle { bottom: 15px; right: 15px; width: 35px; height: 35px; font-size: 14px; }
}
</style>
</head>
<body>

<button id="soundToggle" title="Ney Sesi">🔇</button>

<div class="container">
<h1><span class="nevafil">NEVAFİL</span></h1>
<div class="thanks-sub">
Nevafil size teşekkür eder<br>
Ödemeniz başarıyla alındı. Lisans anahtarınızı oluşturmak için sipariş bilgilerinizi girin.
</div>

<!-- Ad Soyad yan yana -->
<div class="form-row">
<div class="input-group">
<label>Adınız</label>
<input type="text" id="firstName" placeholder="Ahmet" required>
<div id="firstNameError" class="error">Ad zorunlu</div>
</div>
<div class="input-group">
<label>Soyadınız</label>
<input type="text" id="lastName" placeholder="Yılmaz" required>
<div id="lastNameError" class="error">Soyad zorunlu</div>
</div>
</div>

<!-- Telefon ve Sipariş No yan yana -->
<div class="form-row">
<div class="input-group">
<label>Telefon</label>
<input type="tel" id="phone" placeholder="05xx xxx xx xx" required>
<div id="phoneError" class="error">Telefon zorunlu</div>
</div>
<div class="input-group">
<label>Sipariş No (Shopier ID)</label>
<input type="text" id="orderId" placeholder="9 haneli kod" required>
<div id="orderIdError" class="error">9 haneli rakam</div>
</div>
</div>

<!-- Email tam genişlik -->
<div class="form-row">
<div class="input-group full-width">
<label>E-posta adresiniz</label>
<input type="email" id="emailInput" placeholder="ornek@email.com" required>
<div id="emailError" class="error">E-posta zorunlu</div>
</div>
</div>

<!-- Lisans üret butonu -->
<button id="generateBtn" onclick="generateLicense()">🔑 Lisans Anahtarını Oluştur</button>

<!-- Güven rozeti -->
<div class="trust-badge">
<span><i class="fas fa-lock"></i> SSL ile korunuyor</span>
<span><i class="fas fa-shield-alt"></i> Güvenli ödeme</span>
<span><i class="fas fa-credit-card"></i> 256-bit şifreleme</span>
<span><i class="fas fa-check-circle"></i> Resmi lisans</span>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCloL8IN0NpHQBxFjaRH_62vOEWjLQjr4o",
authDomain: "duapro-a7d7e.firebaseapp.com",
projectId: "duapro-a7d7e",
storageBucket: "duapro-a7d7e.appspot.com",
messagingSenderId: "450775848659",
appId: "1:450775848659:web:ca192a401da3f887e1e626"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const generateKey = () => 'GAME-' + Math.random().toString(36).substring(2,10).toUpperCase();

function isValidEmail(email) {
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function isValidOrderId(orderId) {
return /^\d{9}$/.test(orderId);
}

async function copyToClipboard(text) {
try {
if (navigator.clipboard && navigator.clipboard.writeText) {
await navigator.clipboard.writeText(text);
return true;
} else {
// Fallback
const textarea = document.createElement('textarea');
textarea.value = text;
textarea.style.position = 'fixed';
textarea.style.opacity = '0';
document.body.appendChild(textarea);
textarea.select();
textarea.setSelectionRange(0, 99999);
const successful = document.execCommand('copy');
document.body.removeChild(textarea);
return successful;
}
} catch (err) {
console.error('Kopyalama hatası:', err);
return false;
}
}

window.generateLicense = async () => {
const firstName = document.getElementById('firstName').value.trim();
const lastName = document.getElementById('lastName').value.trim();
const phone = document.getElementById('phone').value.trim();
const email = document.getElementById('emailInput').value.trim().toLowerCase();
const orderId = document.getElementById('orderId').value.trim();

// Hata mesajlarını gizle
document.querySelectorAll('.error').forEach(el => el.style.display = 'none');

let hasError = false;

// Validasyonlar
if (!firstName) { 
document.getElementById('firstNameError').innerText = 'Ad zorunlu';
document.getElementById('firstNameError').style.display = 'block'; 
hasError = true; 
}

if (!lastName) { 
document.getElementById('lastNameError').innerText = 'Soyad zorunlu';
document.getElementById('lastNameError').style.display = 'block'; 
hasError = true; 
}

if (!phone) { 
document.getElementById('phoneError').innerText = 'Telefon zorunlu';
document.getElementById('phoneError').style.display = 'block'; 
hasError = true; 
}

if (!email) {
document.getElementById('emailError').innerText = 'E-posta zorunlu';
document.getElementById('emailError').style.display = 'block';
hasError = true;
} else if (!isValidEmail(email)) {
document.getElementById('emailError').innerText = 'Geçerli e-posta girin';
document.getElementById('emailError').style.display = 'block';
hasError = true;
}

if (!orderId) {
document.getElementById('orderIdError').innerText = 'Sipariş no zorunlu';
document.getElementById('orderIdError').style.display = 'block';
hasError = true;
} else if (!isValidOrderId(orderId)) {
document.getElementById('orderIdError').innerText = '9 haneli rakam olmalı';
document.getElementById('orderIdError').style.display = 'block';
hasError = true;
}

// Eğer hata varsa işlemi durdur
if (hasError) {
// İlk hata alanına odaklan
const firstError = document.querySelector('.error[style*="block"]');
if (firstError) {
firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
return;
}

const generateBtn = document.getElementById('generateBtn');
generateBtn.disabled = true;
generateBtn.innerText = 'Oluşturuluyor...';

try {
// Önce bu sipariş numarası ile lisans var mı kontrol et
const q = query(collection(db, "licenses"), where("orderId", "==", orderId));
const snapshot = await getDocs(q);

if (!snapshot.empty) {
await Swal.fire({
icon: 'warning',
title: 'Uyarı',
text: 'Bu sipariş numarası ile zaten bir lisans oluşturulmuş.',
confirmButtonColor: '#0a192f'
});
generateBtn.disabled = false;
generateBtn.innerText = '🔑 Lisans Anahtarını Oluştur';
return;
}

// Yeni lisans oluştur
const key = generateKey();

// Firebase'e kaydet
await addDoc(collection(db, "licenses"), {
key: key,
firstName: firstName,
lastName: lastName,
phone: phone,
email: email,
orderId: orderId,
used: false,
createdAt: new Date()
});

// Lisansı kopyala
const copied = await copyToClipboard(key);

if (copied) {
await Swal.fire({
icon: 'success',
title: 'Lisans Oluşturuldu!',
html: `Lisans anahtarınız panoya kopyalandı.<br><strong>${key}</strong><br><br>Oyun giriş sayfasına yönlendiriliyorsunuz...`,
timer: 2000,
showConfirmButton: false
});
} else {
await Swal.fire({
icon: 'success',
title: 'Lisans Oluşturuldu!',
html: `Lisans anahtarınız: <strong>${key}</strong><br><br>Oyun giriş sayfasına yönlendiriliyorsunuz...`,
timer: 2000,
showConfirmButton: false
});
}

// LocalStorage'a kaydet (yedek)
localStorage.setItem('nevafil_license_key', key);
localStorage.setItem('nevafil_user_name', `${firstName} ${lastName}`);

// game1/index.html sayfasına yönlendir (lisans parametresi ile)
setTimeout(() => {
window.location.href = `game1/index.html?license=${encodeURIComponent(key)}`;
}, 2000);

} catch (e) {
console.error("Anahtar kaydedilemedi:", e);
await Swal.fire({
icon: 'error',
title: 'Hata',
text: 'Lisans oluşturulamadı. Lütfen daha sonra tekrar deneyin.',
confirmButtonColor: '#0a192f'
});
generateBtn.disabled = false;
generateBtn.innerText = '🔑 Lisans Anahtarını Oluştur';
}
};

// Ney Sesi - GitHub raw URL - Kullanıcı tıklayınca çalar
let isMusicPlaying = false;
let neyAudio = null;
let audioError = false;
let audioLoaded = false;

function initAudio() {
const btn = document.getElementById('soundToggle');
if (!btn) return;

if (!neyAudio) {
neyAudio = new Audio();
neyAudio.loop = true;
neyAudio.volume = 0.3;

const audioUrl = 'https://raw.githubusercontent.com/ercansahin16/game1/main/tools/ney.mp3';
console.log('Müzik URL:', audioUrl);

neyAudio.addEventListener('canplaythrough', () => {
console.log('✅ Müzik yüklendi');
audioLoaded = true;
audioError = false;
btn.classList.remove('error');
}, { once: true });

neyAudio.addEventListener('error', (e) => {
console.error('❌ Müzik yüklenemedi:', audioUrl);
audioError = true;
btn.classList.add('error');
btn.innerHTML = '❌';
btn.title = 'Müzik dosyası bulunamadı';
}, { once: true });

neyAudio.src = audioUrl;
}
}

function playAudio() {
const btn = document.getElementById('soundToggle');
if (!btn || !neyAudio || !audioLoaded || audioError) return;

const playPromise = neyAudio.play();
if (playPromise !== undefined) {
playPromise.then(() => {
isMusicPlaying = true;
btn.innerHTML = '🔊';
btn.title = 'Ney Sesi (Çalıyor)';
console.log('▶️ Müzik çalıyor');
}).catch(e => {
console.error("⛔ Çalma hatası:", e);
isMusicPlaying = false;
btn.innerHTML = '🔇';
btn.title = 'Ney Sesi (Başlatmak için tıklayın)';
});
}
}

window.toggleManeviMusic = function() {
const btn = document.getElementById('soundToggle');
if (!btn) return;

if (!neyAudio) {
initAudio();
}

if (audioError) {
audioError = false;
audioLoaded = false;
neyAudio = null;
initAudio();
setTimeout(() => {
if (audioLoaded) playAudio();
}, 1000);
return;
}

if (!audioLoaded) {
btn.innerHTML = '⏳';
setTimeout(() => {
if (!audioLoaded) btn.innerHTML = '🔇';
}, 2000);
return;
}

if (isMusicPlaying) {
neyAudio.pause();
btn.innerHTML = '🔇';
btn.title = 'Ney Sesi';
isMusicPlaying = false;
} else {
playAudio();
}
};

// Ses butonu event listener
document.addEventListener("DOMContentLoaded", () => {
const soundBtn = document.getElementById('soundToggle');
if (soundBtn) soundBtn.onclick = () => window.toggleManeviMusic();
});
</script>
</body>
</html>
