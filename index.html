<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevafil - Manevi Bilgi Yolculuğu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-dark: #5a4ddb;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        /* Loading Spinner */
        #loadingSpinner {
            position: fixed;
            inset: 0;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(108, 92, 231, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modern Lisans Kutusu */
        #licensePrompt {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100; /* SweetAlert'in altında kalması için düşürüldü */
            padding: 20px;
        }

        .license-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
        }

        .logo-area {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .license-card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #a29bfe, #6c5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .license-card p {
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        #licenseInput {
            width: 100%;
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(108, 92, 231, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        #licenseInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(108, 92, 231, 0.5);
        }

        /* Iframe */
        #gameContainer {
            width: 100%;
            height: 100vh;
            display: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* SweetAlert Custom Style */
        .swal2-popup {
            border-radius: 20px !important;
            padding: 2rem !important;
        }
    </style>
</head>
<body>

<div id="loadingSpinner">
    <div class="spinner"></div>
</div>

<div id="licensePrompt">
    <div class="license-card animate__animated animate__zoomIn">
        <div class="logo-area">🕌</div>
        <h2>Lisans Doğrulama</h2>
        <p>Devam etmek için lütfen anahtarınızı girin</p>
        
        <div class="input-group">
            <input type="text" id="licenseInput" placeholder="GAME-XXXXXX" spellcheck="false">
        </div>
        
        <button class="submit-btn" onclick="window.onLicenseSubmit()">
            <span>Maceraya Başla</span>
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
        </button>
    </div>
</div>

<div id="gameContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, updateDoc, doc } 
    from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';
    
    const firebaseConfig = {
        apiKey: "AIzaSyCloL8IN0NpHQBxFjaRH_62vOEWjLQjr4o",
        authDomain: "duapro-a7d7e.firebaseapp.com",
        projectId: "duapro-a7d7e",
        storageBucket: "duapro-a7d7e.appspot.com",
        messagingSenderId: "450775848659",
        appId: "1:450775848659:web:ca192a401da3f887e1e626"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    function getDeviceId() {
        let id = localStorage.getItem("deviceId");
        if (!id) {
            id = 'dev_' + Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
            localStorage.setItem("deviceId", id);
        }
        return id;
    }
    
    async function verifyLicense(key) {
        try {
            const q = query(collection(db, "licenses"), where("key", "==", key));
            const snapshot = await getDocs(q);
            
            if (snapshot.empty) return { ok: false, msg: "Lisans anahtarı geçersiz!" };
            
            const licenseDoc = snapshot.docs[0];
            const data = licenseDoc.data();
            const currentDevice = getDeviceId();
            
            if (!data.deviceId || data.deviceId === "") {
                await updateDoc(doc(db, "licenses", licenseDoc.id), {
                    deviceId: currentDevice,
                    used: true
                });
                return { ok: true };
            }
            
            if (data.deviceId === currentDevice) return { ok: true };
            
            return { ok: false, msg: "Bu lisans zaten başka bir cihazda kullanılıyor!" };
        } catch (e) {
            return { ok: false, msg: "Bağlantı hatası oluştu." };
        }
    }
    
    function startGame() {
        document.getElementById("loadingSpinner").style.display = "none";
        document.getElementById("licensePrompt").style.display = "none";
        const container = document.getElementById("gameContainer");
        container.style.display = "block";
        
        if (!container.querySelector("iframe")) {
            const iframe = document.createElement("iframe");
            iframe.src = "game/index.html";
            container.appendChild(iframe);
        }
    }
    
    window.addEventListener("load", async () => {
        const saved = localStorage.getItem("nevafilKey");
        
        if (saved) {
            const res = await verifyLicense(saved);
            if (res.ok) {
                startGame();
                return;
            } else {
                localStorage.removeItem("nevafilKey");
            }
        }
        
        document.getElementById("loadingSpinner").style.display = "none";

        // ÖNCE HOŞGELDİN MESAJI
        await Swal.fire({
            title: '✨ Nevafil’e Hoş Geldin!',
            html: `
                <div style="text-align: center; color: #4a5568;">
                    <p style="font-size: 1.1rem; margin-bottom: 15px;">
                        Manevi bilgilerle dolu, eğlenceli ve huzurlu bir yolculuğa çıkmaya hazır mısın?
                    </p>
                    <div style="background: #edf2f7; padding: 15px; border-radius: 12px;">
                        🔑 Lisans anahtarını girerek macerayı başlatabilirsin.
                    </div>
                </div>
            `,
            confirmButtonText: 'Başlayalım!',
            confirmButtonColor: '#6c5ce7',
            allowOutsideClick: false,
            showClass: { popup: 'animate__animated animate__fadeInDown' }
        });
        
        // SONRA LİSANS EKRANI
        document.getElementById("licensePrompt").style.display = "flex";
    });
    
    window.onLicenseSubmit = async () => {
        const input = document.getElementById("licenseInput");
        const key = input.value.trim().toUpperCase();
        
        if (!key) {
            Swal.fire('Hata', 'Lütfen lisans anahtarınızı girin.', 'warning');
            return;
        }

        Swal.showLoading();
        const res = await verifyLicense(key);
        
        if (res.ok) {
            localStorage.setItem("nevafilKey", key);
            Swal.fire({
                icon: 'success',
                title: 'Doğrulandı!',
                text: 'Keyifli oyunlar dileriz...',
                timer: 1500,
                showConfirmButton: false
            });
            setTimeout(startGame, 1500);
        } else {
            Swal.fire('Başarısız', res.msg, 'error');
        }
    };
</script>

</body>
</html>
