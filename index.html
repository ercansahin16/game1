<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevafil Game - Manevi Bilgi Oyunu</title>
    <!-- SweetAlert2 CSS (opsiyonel) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        
        /* Loading Spinner */
        #loadingSpinner {
            position: fixed;
            inset: 0;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #6c5ce7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Lisans Prompt Overlay */
        #licensePrompt {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
            box-sizing: border-box;
        }

        .license-box {
            background: #1e1e1e;
            padding: 35px;
            border-radius: 15px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .license-box:hover {
            transform: translateY(-3px);
        }

        .license-box h2 {
            color: #6c5ce7;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        #licenseInput {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #121212;
            color: #fff;
            font-size: 1em;
            box-sizing: border-box;
        }

        #licenseInput::placeholder {
            color: #888;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #6c5ce7;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a4ddb;
        }

        /* Game container */
        #gameContainer {
            width: 100%;
            height: 100vh;
            display: none;
        }

        @media (max-width: 480px) {
            .license-box { padding: 25px; }
            .license-box h2 { font-size: 1.5em; }
            #licenseInput { padding: 10px; }
            button { padding: 10px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="license-check.js"></script>
</head>
<body>

<div id="loadingSpinner">
    <div class="spinner"></div>
</div>

<div id="licensePrompt">
    <div class="license-box">
        <h2>🔑 Lisans Anahtarı</h2>
        <p style="color: #fff; margin-bottom: 15px;">Lütfen size gönderilen lisans anahtarını girin</p>
        <input type="text" id="licenseInput" placeholder="GAME-XXXXXX">
        <button onclick="window.onLicenseSubmit()">Oyuna Başla</button>
    </div>
</div>

<div id="gameContainer"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, updateDoc } 
    from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';
    
    // Firebase config (kendi config'ini buraya ekle)
    const firebaseConfig = {
        apiKey: "AIzaSyCloL8IN0NpHQBxFjaRH_62vOEWjLQjr4o",
        authDomain: "duapro-a7d7e.firebaseapp.com",
        projectId: "duapro-a7d7e",
        storageBucket: "duapro-a7d7e.appspot.com",
        messagingSenderId: "450775848659",
        appId: "1:450775848659:web:ca192a401da3f887e1e626"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Device ID fonksiyonu
    function getDeviceId() {
        let id = localStorage.getItem("deviceId");
        if (!id) {
            id = Math.random().toString(36).substring(2) + Date.now().toString(36);
            localStorage.setItem("deviceId", id);
        }
        return id;
    }
    
    // Lisans doğrulama
    async function verifyLicense(key) {
        try {
            const q = query(collection(db, "licenses"), where("key", "==", key));
            const snapshot = await getDocs(q);
            
            if (snapshot.empty) return false;
            
            const docRef = snapshot.docs[0];
            const data = docRef.data();
            const currentDevice = getDeviceId();
            
            if (!data.deviceId) {
                await updateDoc(docRef.ref, {
                    deviceId: currentDevice,
                    used: true
                });
                return true;
            }
            
            if (data.deviceId === currentDevice) return true;
            
            return false;
        } catch (e) {
            console.error("Lisans doğrulama hatası:", e);
            return false;
        }
    }
    
    // Oyun başlatma
    function startGame() {
        document.getElementById("loadingSpinner").style.display = "none";
        document.getElementById("licensePrompt").style.display = "none";
        document.getElementById("gameContainer").style.display = "block";
        
        const iframe = document.createElement("iframe");
        iframe.src = "game/index.html";
        iframe.style.width = "100%";
        iframe.style.height = "100vh";
        iframe.style.border = "none";
        
        document.getElementById("gameContainer").appendChild(iframe);
    }
    
    // Sayfa yüklendiğinde
    window.addEventListener("load", async () => {
        const saved = localStorage.getItem("nevafilKey");
        
        if (saved) {
            const ok = await verifyLicense(saved);
            if (ok) {
                startGame();
                return;
            } else {
                localStorage.removeItem("nevafilKey");
            }
        }
        
        // İlk kez gelen kullanıcı için hoş geldin mesajı
        const { isConfirmed } = await Swal.fire({
            title: '✨ Nevafil Oyununa Hoş Geldiniz!',
            html: `
                <div style="text-align: center;">
                    <p style="font-size: 1.1rem; margin-bottom: 15px;">
                        Manevi bilgilerle dolu bu güzel yolculuğa hazır mısınız?
                    </p>
                    <p style="background: #f3f4f6; padding: 12px; border-radius: 8px; margin: 10px 0;">
                        <i class="fas fa-key" style="color: #6c5ce7;"></i> 
                        Lisans anahtarınızı girin ve oyuna başlayın.
                    </p>
                </div>
            `,
            icon: 'info',
            confirmButtonText: 'Anladım, devam et',
            confirmButtonColor: '#6c5ce7',
            showClass: {
                popup: 'animate__animated animate__fadeInDown'
            },
            hideClass: {
                popup: 'animate__animated animate__fadeOutUp'
            },
            background: '#fff',
            color: '#2d3748',
            backdrop: true,
            allowOutsideClick: false
        });
        
        // Kullanıcı anladım dedikten sonra lisans ekranını göster
        document.getElementById("loadingSpinner").style.display = "none";
        document.getElementById("licensePrompt").style.display = "flex";
    });
    
    // Lisans gönderme işlemi
    window.onLicenseSubmit = async () => {
        const key = document.getElementById("licenseInput").value.trim();
        if (!key) {
            Swal.fire('Uyarı', 'Lütfen bir lisans anahtarı girin', 'warning');
            return;
        }
        
        const ok = await verifyLicense(key);
        if (ok) {
            localStorage.setItem("nevafilKey", key);
            startGame();
        } else {
            Swal.fire('Hata', 'Geçersiz lisans veya başka cihazda kullanılıyor!', 'error');
        }
    };
</script>

</body>
</html>
