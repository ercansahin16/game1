<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevafil - Ailede Muhabbet Yolculuğu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Manevi ve Ferah Renk Paleti */
            --gold: #c5a059;
            --gold-light: #e0c58e;
            --navy: #1a2a44;
            --cream: #fdfbf7;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --glass-white: rgba(255, 255, 255, 0.92);
            --border-gold: rgba(197, 160, 89, 0.3);
            --shadow-soft: 0 20px 50px rgba(0, 0, 0, 0.1);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            /* Arka plan: Ferah bir bahar sabahı veya sakin bir dergah hissi */
            background: 
                radial-gradient(circle at top right, rgba(197, 160, 89, 0.15), transparent 40%),
                radial-gradient(circle at bottom left, rgba(26, 42, 68, 0.05), transparent 40%),
                linear-gradient(135deg, #fdfbf7 0%, #f5f0e6 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Lisans Ekranı Overlay */
        #licensePrompt {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: rgba(253, 251, 247, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .card {
            width: 100%;
            max-width: 440px;
            padding: 40px 30px;
            border-radius: 30px;
            background: var(--glass-white);
            /* Altın çerçeve detayı */
            border: 1px solid var(--border-gold);
            box-shadow: var(--shadow-soft);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Dekoratif Köşe Motifi */
        .card::after {
            content: "✿";
            position: absolute;
            top: 10px;
            right: 15px;
            color: var(--gold);
            opacity: 0.3;
            font-size: 20px;
        }

        .app-logo {
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
            display: block;
            border-radius: 50%; /* Daha yumuşak geçiş için tam yuvarlak */
            padding: 5px;
            border: 2px solid var(--gold);
            background: white;
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.2);
        }

        h2 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: var(--navy);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .form-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            width: 100%;
            height: 55px;
            padding: 0 20px;
            border-radius: 15px;
            border: 1px solid #e0e0e0;
            background: white;
            color: var(--navy);
            font-size: 1rem;
            text-align: center;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(197, 160, 89, 0.1);
        }

        /* Ana Buton: Güçlü ama Nazik */
        .submit-btn {
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 15px;
            background: var(--navy);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(26, 42, 68, 0.2);
        }

        .submit-btn:hover {
            background: #23395d;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(26, 42, 68, 0.3);
        }

        /* Lisans Satın Alma: İlgi Çekici ve Güven Verici */
        .buy-license-btn {
            background: linear-gradient(135deg, var(--gold) 0%, #b38b43 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
        }

        .buy-license-btn:hover {
            opacity: 0.95;
            transform: scale(1.02);
        }

        .link-button {
            background: transparent;
            border: 1px solid #eee;
            color: var(--text-muted);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .link-button:hover {
            background: #f9f9f9;
            color: var(--navy);
            border-color: var(--gold);
        }

        .small-text {
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-family: 'Playfair Display', serif;
        }

        /* Karşılama Spinner'ı için özel düzenleme */
        #loadingSpinner {
            background: var(--cream);
        }

        /* Mobil Düzenlemeler */
        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
            h2 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div id="loadingSpinner">
    <img src="img/loader.png" alt="Yükleniyor..." style="width: 80px; height: 80px; animation: spin 2s linear infinite; opacity: 0.6;">
</div>

<div id="licensePrompt">
    <div class="card animate__animated animate__fadeInUp">
        <img src="https://raw.githubusercontent.com/ercansahin16/game1/refs/heads/main/favicon.ico" alt="Nevafil Logo" class="app-logo">

        <h2>NEVAFİL</h2>
        <p class="subtitle">Muhabbet ve Anlayış Yolculuğu</p>

        <div class="form-stack">
            <input type="text" id="licenseInput" placeholder="Lisans Anahtarınızı Giriniz">

            <button class="submit-btn" onclick="window.onLicenseSubmit()">Yolculuğa Başla</button>

            <a class="buy-license-btn" href="https://www.shopier.com/nevafil/44722560" target="_blank">
                <span>🕊️ Lisans Anahtarı Al</span>
            </a>

            <button class="link-button" onclick="window.showEmailModal()">🔑 Lisansımı Hatırlat</button>
            <button class="link-button" onclick="window.showHelpModal()">❔ Yardım ve Destek</button>
        </div>

        <p class="small-text">Sizin için hazırlanan manevi dünyaya hoş geldiniz.</p>
    </div>
</div>

</body>
</html>
