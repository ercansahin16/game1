<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevafil - Ailede Muhabbet Yolculuğu</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a2a44">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Nevafil">
    <link rel="apple-touch-icon" href="/game/icons/icon-192.png">

    <style>
        :root {
            --gold: #c5a059;
            --navy: #1a2a44;
            --cream: #fdfbf7;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --glass-white: rgba(255, 255, 255, 0.95);
            --border-gold: rgba(197, 160, 89, 0.3);
            --shadow-soft: 0 20px 60px rgba(0, 0, 0, 0.08);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            font-family: 'Inter', sans-serif;
            background: 
                radial-gradient(circle at top right, rgba(197, 160, 89, 0.12), transparent 40%),
                radial-gradient(circle at bottom left, rgba(26, 42, 68, 0.05), transparent 40%),
                linear-gradient(135deg, #fdfbf7 0%, #f5f0e6 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ses Kontrolü */
        #audioControl {
            position: fixed;
            top: 25px;
            right: 25px;
            cursor: pointer;
            z-index: 1001;
            background: white;
            padding: 12px;
            border-radius: 50%;
            border: 1px solid var(--border-gold);
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #audioControl:hover { transform: scale(1.1); }

        /* PWA Banner */
        .pwa-mini {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--glass-white);
            padding: 10px 18px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: var(--shadow-soft);
            z-index: 1000;
            border: 1px solid var(--border-gold);
            backdrop-filter: blur(8px);
        }
        .pwa-mini.hidden { display: none; }
        .pwa-mini-btn {
            border: none;
            background: var(--gold);
            color: white;
            padding: 5px 15px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Yükleme Ekranı */
        #loadingSpinner {
            position: fixed;
            inset: 0;
            background: var(--cream);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Lisans Paneli */
        #licensePrompt {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(12px);
            background: rgba(253, 251, 247, 0.4);
            z-index: 100;
        }

        .card {
            width: 100%;
            max-width: 420px;
            padding: 45px 35px;
            border-radius: 35px;
            background: var(--glass-white);
            border: 1px solid var(--border-gold);
            box-shadow: var(--shadow-soft);
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .app-logo {
            width: 95px;
            height: 95px;
            margin: 0 auto 25px;
            display: block;
            border-radius: 50%;
            padding: 5px;
            border: 2px solid var(--gold);
            background: white;
            box-shadow: 0 10px 25px rgba(197, 160, 89, 0.2);
        }

        h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            color: var(--navy);
            margin-bottom: 8px;
            letter-spacing: 3px;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 30px;
        }

        .form-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            width: 100%;
            height: 54px;
            padding: 0 20px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            background: #fff;
            color: var(--navy);
            font-size: 1rem;
            text-align: center;
            transition: var(--transition);
        }
        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(197, 160, 89, 0.1);
        }

        .submit-btn {
            background: var(--navy);
            color: white;
            border: none;
            height: 54px;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(26, 42, 68, 0.15);
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(26, 42, 68, 0.2); }

        .buy-license-btn {
            background: linear-gradient(135deg, var(--gold) 0%, #b38b43 100%);
            color: white;
            text-decoration: none;
            height: 54px;
            border-radius: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
            animation: pulse-gold 3s infinite;
        }
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(197, 160, 89, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(197, 160, 89, 0); }
            100% { box-shadow: 0 0 0 0 rgba(197, 160, 89, 0); }
        }

        .link-button {
            background: transparent;
            border: 1px solid #f1f5f9;
            color: var(--text-muted);
            padding: 12px;
            border-radius: 14px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .link-button:hover { background: #f8fafc; color: var(--navy); border-color: var(--gold); }

        .small-text {
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: 'Playfair Display', serif;
            line-height: 1.5;
        }

        #gameContainer { width: 100%; height: 100vh; display: none; }
        iframe { width: 100%; height: 100%; border: none; }

        /* SweetAlert Tasarımı (Sertifika ile uyumlu) */
        .swal2-popup { border-radius: 25px !important; background: var(--cream) !important; border: 1px solid var(--gold) !important; }
        .swal2-title { color: var(--navy) !important; font-family: 'Cinzel', serif !important; }
        .swal2-confirm { background: var(--navy) !important; border-radius: 12px !important; }

        @media (max-width: 480px) {
            .card { padding: 35px 20px; border-radius: 30px; }
            h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div id="audioControl" onclick="toggleAudio()">
    <span id="audioIcon">🔇</span>
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
</div>

<div id="pwaBanner" class="pwa-mini hidden">
    <span>📲 Nevafil'i</span>
    <button id="installBtn" class="pwa-mini-btn">Yükle</button>
</div>

<div id="loadingSpinner">
    <img src="img/loader.png" alt="Nevafil" style="width: 70px; height: 70px; animation: spin 3s linear infinite; opacity: 0.7;">
    <p style="margin-top: 15px; font-family: 'Playfair Display', serif; color: var(--gold); font-style: italic;">Huzura hazırlanıyor...</p>
</div>

<div id="licensePrompt">
    <div class="card">
        <img src="https://raw.githubusercontent.com/ercansahin16/game1/refs/heads/main/favicon.ico" alt="Logo" class="app-logo">

        <h2>NEVAFİL</h2>
        <p class="subtitle">Manevi bir yolculuğa hazır mısınız?</p>

        <div class="form-stack">
            <input type="text" id="licenseInput" placeholder="Lisans Anahtarı (GAME-XXXX)">

            <button class="submit-btn" onclick="window.onLicenseSubmit()">Yolculuğa Başla</button>

            <a class="buy-license-btn" href="https://www.shopier.com/nevafil/44722560" target="_blank">
                <span>🕊️ Lisans Anahtarı Al</span>
            </a>

            <button class="link-button" onclick="window.showEmailModal()">🔑 Lisansımı Hatırlat</button>
            <button class="link-button" onclick="window.showHelpModal()">❔ Yardım / İletişim</button>
        </div>

        <p class="small-text">Sizin için hazırlanan manevi dünyaya hoş geldiniz.<br>Muhabbetiniz daim olsun.</p>
    </div>
</div>

<div id="gameContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    window.toggleAudio = function() {
        const audio = document.getElementById('bgMusic');
        const icon = document.getElementById('audioIcon');
        if (audio.paused) {
            audio.play();
            icon.innerText = "🔊";
        } else {
            audio.pause();
            icon.innerText = "🔇";
        }
    };

</script>
</body>
</html>
