<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevafil - Gönül Yolculuğu</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Daha Sıcak ve Tok Manevi Renkler */
            --antique-gold: #b38b43;
            --gold-light: rgba(179, 139, 67, 0.2);
            --gold-glow: rgba(179, 139, 67, 0.05);
            --navy-spiritual: #142a4a;
            --spiritual-bg: #fcf6eb; /* Daha sıcak krem */
            --text-main: #3e4e5e;
            --transition-slow: all 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--spiritual-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* 1. MANEVİ AMBİYANS: TEZHİP MOTİFLİ ARKA PLAN */
        .ambient-bg {
            position: fixed;
            inset: 0;
            background-color: var(--spiritual-bg);
            /* Şeffaf motifli arka plan (Tezhip/Osmanlı dokusu) */
            background-image: 
                radial-gradient(circle at 50% 10%, var(--gold-glow) 0%, transparent 40%),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><g fill="%23b38b43" fill-opacity="0.015"><path d="M50 0 L60 10 L50 20 L40 10 Z M0 50 L10 40 L20 50 L10 60 Z M100 50 L90 60 L80 50 L90 40 Z M50 100 L40 90 L50 80 L60 90 Z M25 25 L35 35 M75 25 L65 35 M25 75 L35 65 M75 75 L65 65" stroke="%23b38b43" stroke-width="0.5"/></g></svg>');
            z-index: -1;
            animation: bgAtmosphere 20s linear infinite alternate;
        }

        @keyframes bgAtmosphere {
            0% { background-position: 0 0; opacity: 0.8; }
            100% { background-position: 50px 50px; opacity: 1; }
        }

        /* 2. ANA KART: MOTİFLİ ÇERÇEVE VE DERİNLİK */
        .spiritual-card {
            width: 90%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            /* Zarif ve tam dolanan altın çerçeve */
            border: 3px solid var(--gold-light);
            border-image: linear-gradient(135deg, var(--gold-light) 0%, var(--antique-gold) 50%, var(--gold-light) 100%) 1;
            border-radius: 45px;
            padding: 70px 50px 60px;
            text-align: center;
            box-shadow: 
                0 40px 120px rgba(179, 139, 67, 0.1),
                inset 0 0 30px rgba(255, 255, 255, 0.6);
            animation: cardWarpIn 1.8s ease-out;
            position: relative;
        }

        /* Köşe Süsleri (Gelenekselsonsuzluk düğümü benzeri) */
        .spiritual-card::before, .spiritual-card::after {
            content: "♾️"; /* Manevi sonsuzluk sembolü */
            position: absolute;
            color: var(--antique-gold);
            font-size: 18px;
            opacity: 0.4;
        }
        .spiritual-card::before { top: 20px; left: 20px; }
        .spiritual-card::after { bottom: 20px; right: 20px; }

        @keyframes cardWarpIn {
            from { opacity: 0; transform: translateY(60px) scale(0.95) rotateX(-10deg); }
            to { opacity: 1; transform: translateY(0) scale(1) rotateX(0); }
        }

        /* 3. LOGO VE IŞIMA (KANDİL) */
        .logo-section {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
        }

        /* Logonun etrafında sıcak bir parıltı (Kandil hissi) */
        .logo-section::after {
            content: "";
            position: absolute;
            inset: -25px;
            background: radial-gradient(circle, rgba(179, 139, 67, 0.2) 0%, transparent 70%);
            z-index: -1;
            border-radius: 50%;
            animation: spiritualGlow 5s ease-in-out infinite;
        }

        @keyframes spiritualGlow {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.15); opacity: 0.9; }
        }

        .app-logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--antique-gold);
            padding: 7px;
            background: #fff;
            box-shadow: 0 10px 30px rgba(179, 139, 67, 0.2);
        }

        h2 {
            font-family: 'Cinzel', serif;
            font-size: 2.4rem;
            letter-spacing: 6px;
            color: var(--navy-spiritual);
            margin-bottom: 15px;
            text-shadow: 0 3px 6px rgba(0,0,0,0.06);
            position: relative;
        }
        
        /* Başlık Altı Manevi Parıltı Sembolü */
        h2::after {
            content: "✦✦✦"; /* Üçlü manevi parıltı */
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--antique-gold);
            font-size: 16px;
            letter-spacing: 2px;
            opacity: 0.6;
        }

        .spiritual-motto {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--text-main);
            font-size: 1.2rem;
            margin-top: 35px;
            margin-bottom: 45px;
            opacity: 0.9;
            line-height: 1.6;
        }

        /* GİRİŞ ALANLARI VE BUTONLAR */
        .form-group {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(179, 139, 67, 0.1);
            padding: 20px;
            border-radius: 22px;
            font-size: 1.1rem;
            text-align: center;
            color: var(--navy-spiritual);
            transition: var(--transition-slow);
        }

        input:focus {
            background: #fff;
            border-color: var(--antique-gold);
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 15px 40px rgba(179, 139, 67, 0.15);
        }

        .btn-start {
            background: var(--navy-spiritual);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 22px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition-slow);
            box-shadow: 0 15px 30px rgba(10, 25, 47, 0.2);
            letter-spacing: 1px;
        }

        .btn-start:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 45px rgba(10, 25, 47, 0.3);
            background: #1a3a61;
        }

        /* LİSANS SATIN AL: GÜVEN VERİCİ VE SICAK */
        .btn-join {
            background: linear-gradient(135deg, var(--antique-gold) 0%, #a67c3b 100%);
            color: white;
            text-decoration: none;
            width: 100%;
            padding: 18px;
            border-radius: 22px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            transition: var(--transition-slow);
            box-shadow: 0 10px 25px rgba(179, 139, 67, 0.2);
        }

        .btn-join:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 35px rgba(179, 139, 67, 0.3);
        }

        .secondary-links {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-recover {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.95rem;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.3s;
            text-decoration: underline;
        }

        .btn-recover:hover { opacity: 1; color: var(--antique-gold); }

        /* SES VE PWA BANNER (Eski kodunuzdan alınmıştır) */
        #maneviSoundControl {
            position: fixed;
            bottom: 35px;
            left: 35px;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid var(--antique-gold);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            z-index: 1000;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        #maneviSoundControl:hover { transform: scale(1.1) rotate(10deg); }

        /* Mobil Düzenlemeler */
        @media (max-width: 480px) {
            .spiritual-card { padding: 50px 30px; border-radius: 35px; }
            h2 { font-size: 1.9rem; letter-spacing: 4px; }
            input, .btn-start, .btn-join { padding: 16px; border-radius: 18px; }
            .spiritual-card::before, .spiritual-card::after { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <button id="maneviSoundControl" onclick="toggleSpiritualMusic()">🔇</button>
    <audio id="maneviAudio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <div class="spiritual-card">
        <div class="logo-section">
            <img src="https://raw.githubusercontent.com/ercansahin16/game1/refs/heads/main/favicon.ico" alt="Nevafil" class="app-logo">
        </div>

        <h2>NEVAFİL</h2>
        <p class="spiritual-motto">Gönül kapısını muhabbetle açmaya hazır mısın?</p>

        <div class="form-group animate__animated animate__fadeInUp animate__delay-1s">
            <input type="text" id="licenseInput" placeholder="Lisans Anahtarınızı Giriniz">
        </div>

        <button class="btn-start animate__animated animate__fadeInUp animate__delay-1s" onclick="onLicenseSubmit()">Bismillah, Yolculuğa Başla</button>

        <a class="btn-join animate__animated animate__fadeInUp animate__delay-1s" href="https://www.shopier.com/nevafil/44722560" target="_blank">
            🕊️ Yolculuğa Katıl (Lisans Al)
        </a>

        <div class="secondary-links animate__animated animate__fadeInUp animate__delay-2s">
            <button class="btn-recover" onclick="showEmailModal()">Lisansımı Hatırlat</button>
            <button class="btn-recover" onclick="showHelpModal()">Yardım ve İletişim</button>
        </div>

        <p style="margin-top: 35px; font-size: 0.78rem; color: #7f8c8d; font-family: 'Playfair Display', serif; line-height: 1.5;">
            "Muhabbetle kurulan her cümle, aile saadetinin birer tuğlasıdır."
        </p>
    </div>

    <script>
        function toggleSpiritualMusic() {
            const audio = document.getElementById('maneviAudio');
            const btn = document.getElementById('maneviSoundControl');
            if (audio.paused) {
                audio.play();
                btn.innerText = "🔊";
                btn.style.backgroundColor = "#fffcf5";
                btn.style.borderColor = "#b38b43";
            } else {
                audio.pause();
                btn.innerText = "🔇";
                btn.style.backgroundColor = "rgba(255, 255, 255, 0.8)";
                btn.style.borderColor = "rgba(179, 139, 67, 0.2)";
            }
        }
        // Firebase ve diğer eski mantıksal kodların buraya (script etiketinin içine) yapıştırılmalıdır.
    </script>
</body>
</html>
