<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevafil - Manevi Bilgi Yolculuğu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-soft: rgba(108, 92, 231, 0.1);
            --bg-dark: #0f172a;
            --glass: rgba(30, 41, 59, 0.6);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent), 
                              radial-gradient(circle at bottom left, #1e1b4b, transparent);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #f8fafc;
        }

        /* Spinner */
        #loadingSpinner {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid var(--primary-soft);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Minimalist Card */
        #licensePrompt {
            position: fixed; inset: 0; display: none;
            justify-content: center; align-items: center;
            backdrop-filter: blur(20px); z-index: 100;
            background: rgba(15, 23, 42, 0.4);
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 40px 30px;
            border-radius: 32px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .app-logo {
            width: 70px; height: 70px;
            margin: 0 auto 20px;
            border-radius: 18px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            object-fit: contain;
        }

        h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 16px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 12px;
            transition: all 0.3s;
            text-align: center;
        }
        input:focus { border-color: var(--primary); background: rgba(0,0,0,0.4); }

        /* Yeni buton stili */
        .link-button {
            background: transparent;
            border: 1px solid var(--border);
            color: #94a3b8;
            padding: 12px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 12px;
        }
        .link-button:hover {
            border-color: var(--primary);
            color: white;
            background: var(--primary-soft);
        }

        .recover-link {
            font-size: 0.8rem; color: #64748b; text-decoration: none;
            display: block; margin-bottom: 25px; transition: 0.2s;
        }
        .recover-link:hover { color: var(--primary); }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        .footer-text { margin-top: 25px; font-size: 0.85rem; color: #64748b; }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 600; }

        #gameContainer { width: 100%; height: 100vh; display: none; }
        iframe { width: 100%; height: 100%; border: none; }

        /* SweetAlert Styling */
        .swal2-popup { border-radius: 24px !important; background: #1e293b !important; color: white !important; }
        .swal2-title { color: white !important; }
        .swal2-html-container { color: #cbd5e1 !important; }
        .swal2-input { background: #334155 !important; border: 1px solid #475569 !important; color: white !important; border-radius: 40px !important; }
        .swal2-confirm { background: var(--primary) !important; border-radius: 40px !important; padding: 12px 24px !important; }
    </style>
</head>
<body>

<div id="loadingSpinner"><div class="spinner"></div></div>

<div id="licensePrompt">
    <div class="card">
        <img src="game1/favicon.ico" alt="Logo" class="app-logo">
        
        <h2>Nevafil</h2>
        <p class="subtitle">Manevi bir yolculuğa hazır mısın?</p>
        
        <!-- Lisans anahtarı girişi -->
        <input type="text" id="licenseInput" placeholder="Lisans Anahtarı (GAME-XXXX)">
        
        <!-- Yeni: Zaten lisansı olanlar için buton -->
        <button class="link-button" onclick="window.showEmailModal()">🔑 Zaten bir lisansım var</button>
        
        <button class="submit-btn" onclick="window.onLicenseSubmit()">Oyuna Giriş Yap</button>

        <!-- Lisans alma linki -->
        <p class="footer-text">Lisansın yok mu? <a href="https://www.shopier.com/nevafil/44722560" target="_blank">Buradan Al</a></p>
    </div>
</div>

<div id="gameContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, updateDoc, doc } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';
    
    const firebaseConfig = {
        apiKey: "AIzaSyCloL8IN0NpHQBxFjaRH_62vOEWjLQjr4o",
        authDomain: "duapro-a7d7e.firebaseapp.com",
        projectId: "duapro-a7d7e",
        storageBucket: "duapro-a7d7e.appspot.com",
        messagingSenderId: "450775848659",
        appId: "1:450775848659:web:ca192a401da3f887e1e626"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    function getDeviceId() {
        let id = localStorage.getItem("deviceId");
        if (!id) {
            id = 'dev_' + Math.random().toString(36).substring(2, 10);
            localStorage.setItem("deviceId", id);
        }
        return id;
    }
    
    async function verifyLicense(key) {
        try {
            const q = query(collection(db, "licenses"), where("key", "==", key));
            const snapshot = await getDocs(q);
            if (snapshot.empty) return { ok: false, msg: "Geçersiz anahtar!" };
            
            const licenseDoc = snapshot.docs[0];
            const data = licenseDoc.data();
            const device = getDeviceId();
            
            if (!data.deviceId) {
                await updateDoc(doc(db, "licenses", licenseDoc.id), { deviceId: device, used: true });
                return { ok: true };
            }
            return data.deviceId === device ? { ok: true } : { ok: false, msg: "Farklı bir cihazda kayıtlı." };
        } catch (e) { return { ok: false, msg: "Sistem hatası." }; }
    }

    // Email ile lisans bulup input'a yaz
window.recoverLicenseByEmail = async function(email) {
    // email parametre olarak geliyor
    if (!email) {
        Swal.fire({
            title: 'Uyarı',
            text: 'E-posta adresi gerekli.',
            icon: 'warning',
            confirmButtonText: 'Tamam'
        });
        return;
    }

    Swal.fire({
        title: 'Aranıyor...',
        html: 'Lisansınız kontrol ediliyor.',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
    });

    try {
        const q = query(collection(db, "licenses"), where("email", "==", email));
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
            Swal.fire({
                icon: 'error',
                title: 'Bulunamadı',
                text: 'Bu e-posta ile kayıtlı bir lisans bulunamadı.',
                confirmButtonText: 'Tamam'
            });
            return;
        }

        // İlk bulunan lisansı al
        const licenseDoc = snapshot.docs[0];
        const licenseData = licenseDoc.data();
        const key = licenseData.key;
        const currentDevice = getDeviceId();

        // Lisans başka cihazda kullanılıyorsa aktarım onayı al
        if (licenseData.deviceId && licenseData.deviceId !== currentDevice) {
            const result = await Swal.fire({
                title: 'Lisans Başka Cihazda',
                html: `Bu lisans daha önce başka bir cihazda kullanılmış.<br><br>
                       <strong>Bu cihaza aktarmak istiyor musunuz?</strong><br>
                       <small>(Eski cihaz lisansı kaybeder.)</small>`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Evet, aktar',
                cancelButtonText: 'Hayır'
            });

            if (result.isConfirmed) {
                await updateDoc(doc(db, "licenses", licenseDoc.id), {
                    deviceId: currentDevice,
                    used: true
                });
                Swal.fire({
                    icon: 'success',
                    title: 'Lisans Aktarıldı',
                    text: 'Lisans artık bu cihazda kullanılabilir.',
                    confirmButtonText: 'Tamam'
                });
            } else {
                return; // Vazgeçti
            }
        } else if (!licenseData.deviceId) {
            // İlk kez kullanılıyor
            await updateDoc(doc(db, "licenses", licenseDoc.id), {
                deviceId: currentDevice,
                used: true
            });
        }

        // Lisans anahtarını input alanına yaz
        const licenseInput = document.getElementById('licenseInput');
        if (licenseInput) {
            licenseInput.value = key;
        }

        Swal.fire({
            icon: 'success',
            title: 'Lisansınız Hazır',
            text: 'Lisans anahtarınız otomatik olarak dolduruldu. "Maceraya Başla" butonuna tıklayarak giriş yapabilirsiniz.',
            confirmButtonText: 'Tamam'
        });

    } catch (e) {
        console.error("E-posta sorgulama hatası:", e);
        Swal.fire({
            icon: 'error',
            title: 'Hata',
            text: 'Sorgulama sırasında bir hata oluştu.',
            confirmButtonText: 'Tamam'
        });
    }
};


    // Yeni: email modalını aç
    window.showEmailModal = async () => {
        const { value: email } = await Swal.fire({
            title: 'E-posta adresiniz',
            text: 'Lisansınızın kayıtlı olduğu e-posta',
            input: 'email',
            inputPlaceholder: 'ornek@email.com',
            showCancelButton: true,
            confirmButtonText: 'Gönder',
            cancelButtonText: 'Vazgeç',
            reverseButtons: true,
            inputValidator: (value) => {
                if (!value) return 'E-posta gerekli';
                if (!/^\S+@\S+\.\S+$/.test(value)) return 'Geçerli bir e-posta girin';
            },
            didOpen: () => {
                // Enter tuşunu dinle
                const input = Swal.getInput();
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        Swal.clickConfirm();
                    }
                });
            }
        });

        if (email) {
            await window.recoverLicenseByEmail(email);
        }
    };

    function startGame() {
        document.getElementById("loadingSpinner").style.display = "none";
        document.getElementById("licensePrompt").style.display = "none";
        const container = document.getElementById("gameContainer");
        container.style.display = "block";
        if (!container.querySelector("iframe")) {
            const ifr = document.createElement("iframe");
            ifr.src = "game/index.html";
            container.appendChild(ifr);
        }
    }

    window.addEventListener("load", async () => {
        const saved = localStorage.getItem("nevafilKey");
        if (saved && (await verifyLicense(saved)).ok) { startGame(); return; }
        
        document.getElementById("loadingSpinner").style.display = "none";
        document.getElementById("licensePrompt").style.display = "flex";
    });

    window.onLicenseSubmit = async () => {
        const key = document.getElementById("licenseInput").value.trim().toUpperCase();
        if (!key) { Swal.fire('Hata', 'Anahtar girilmedi.', 'warning'); return; }

        Swal.fire({ title: 'Giriş Yapılıyor...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        const res = await verifyLicense(key);
        
        if (res.ok) {
            localStorage.setItem("nevafilKey", key);
            Swal.close();
            startGame();
        } else { Swal.fire('Hata', res.msg, 'error'); }
    };
</script>

</body>
</html>
