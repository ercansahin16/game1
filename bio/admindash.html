<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel - Glossy Touch</title>
    <link rel="stylesheet" href="templatemo-glossy-touch.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#88aaff">
    <style>
        /* Kompakt Admin Stilleri */
        * { box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1a 0%, #03060c 100%);
            margin: 0;
            font-family: system-ui, 'Segoe UI', sans-serif;
            color: #eee;
        }
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }
        /* Top bar - menüler sağda */
        .admin-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(20, 25, 40, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .admin-logo {
            font-weight: 600;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #fff, #88aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .admin-actions {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }
        .admin-actions a, .admin-actions button {
            background: rgba(255,255,255,0.12);
            border: none;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
        }
        .admin-actions a:hover, .admin-actions button:hover {
            background: rgba(255,255,255,0.25);
        }
        /* Filtre/Search bar */
        .filter-bar {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
            font-size: 0.8rem;
        }
        .filter-bar input, .filter-bar select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 0.3rem 0.8rem;
            color: white;
            font-size: 0.8rem;
        }
        .filter-bar button {
            background: rgba(100,150,255,0.5);
            border: none;
            border-radius: 30px;
            padding: 0.3rem 1rem;
            cursor: pointer;
            color: white;
        }
        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .card-row {
            background: rgba(25, 30, 45, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 0.6rem 1rem;
            border-left: 4px solid #88aaff;
            transition: 0.1s;
        }
        .card-row.inactive { opacity: 0.6; border-left-color: #888; }
        .card-row:hover { background: rgba(35, 40, 60, 0.8); }
        .row-fields {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.4rem;
        }
        .field-icon { width: 2rem; text-align: center; font-size: 1.3rem; }
        .field-title { flex: 2; min-width: 120px; font-weight: 500; }
        .field-link { flex: 3; font-size: 0.7rem; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .field-check { display: flex; align-items: center; gap: 0.3rem; font-size: 0.7rem; }
        .action-buttons { display: flex; gap: 0.3rem; flex-wrap: wrap; }
        .btn-icon {
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 20px;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            cursor: pointer;
            color: white;
            transition: 0.1s;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.3); }
        .btn-danger { background: rgba(200,60,60,0.6); }
        .btn-success { background: rgba(60,160,60,0.6); }
        .expand-details {
            margin-top: 0.5rem;
            padding-top: 0.3rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: none;
            font-size: 0.7rem;
            grid-template-columns: auto 1fr;
            gap: 0.3rem 0.8rem;
        }
        .expand-details.active { display: grid; }
        .expand-details label { font-weight: 500; }
        .expand-details input, .expand-details textarea {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 0.2rem 0.5rem;
            color: white;
            font-size: 0.7rem;
            width: 100%;
        }
        .add-card-form {
            background: rgba(20, 25, 40, 0.7);
            border-radius: 24px;
            padding: 0.8rem 1rem;
            margin-top: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: flex-end;
        }
        .add-card-form .form-group { flex: 1; min-width: 120px; }
        .add-card-form label { font-size: 0.7rem; display: block; margin-bottom: 0.2rem; }
        .add-card-form input, .add-card-form select, .add-card-form textarea {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 0.3rem 0.6rem;
            font-size: 0.75rem;
            color: white;
        }
        .add-card-form button {
            background: #2c6e9e;
            border: none;
            border-radius: 30px;
            padding: 0.3rem 1rem;
            cursor: pointer;
            color: white;
            font-size: 0.75rem;
        }
        .checkbox-select { width: 1rem; height: 1rem; margin-right: 0.3rem; vertical-align: middle; }
        hr { margin: 0.5rem 0; border-color: rgba(255,255,255,0.1); }
        .small-text { font-size: 0.7rem; color: #aaa; }

        /* Authentication panel stilleri */
        .auth-card {
            max-width: 400px;
            margin: 3rem auto;
            background: rgba(20, 25, 40, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .auth-card input {
            width: 100%;
            margin: 0.5rem 0;
            padding: 0.6rem;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 40px;
            color: white;
        }
        .auth-card button {
            background: #2c6e9e;
            margin-top: 0.5rem;
            width: 100%;
        }
        .auth-card .link-btn {
            background: none;
            border: none;
            color: #88aaff;
            text-decoration: underline;
            cursor: pointer;
            margin-top: 0.8rem;
            font-size: 0.8rem;
        }
        .auth-card .link-btn:hover { color: white; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: rgba(20,25,40,0.95);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 1.5rem;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .modal-content input {
            width: 100%;
            margin: 0.5rem 0;
            padding: 0.6rem;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 40px;
            color: white;
        }
        .modal-content button {
            background: #2c6e9e;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
<div class="admin-container">
    <!-- Ana içerik (sadece giriş yapıldığında gösterilecek) -->
    <div id="mainContent" style="display: none;">
        <div class="admin-topbar">
            <div class="admin-logo">✨ Glossy Touch · Yönetim Paneli</div>
            <div class="admin-actions">
                <div class="user-info" id="userInfo">
                    <span id="userEmail"></span>
                    <button id="changePwdBtn" class="btn-icon">🔑 Şifre Değiştir</button>
                    <button id="logoutBtn" class="btn-icon">🚪 Çıkış</button>
                </div>
                <button id="refreshBtn">🔄 Yenile</button>
                <a href="index.html" target="_blank">🌐 Siteyi Görüntüle</a>
            </div>
        </div>

        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="🔍 Başlık veya link ara..." style="width: 200px;">
            <select id="filterActive">
                <option value="all">Tümü</option>
                <option value="active">Aktif</option>
                <option value="inactive">Pasif</option>
            </select>
            <select id="sortBy">
                <option value="order">Sıra (varsayılan)</option>
                <option value="title">Başlık A-Z</option>
                <option value="date">Oluşturma tarihi</option>
            </select>
            <button id="bulkDeleteBtn" class="btn-danger">🗑 Seçilenleri Sil</button>
            <span class="small-text" id="cardCount"></span>
        </div>

        <div id="cardsContainer" class="cards-list">
            <div class="small-text" style="padding:1rem;">Yükleniyor...</div>
        </div>

        <div class="add-card-form">
            <div class="form-group">
                <label>İkon</label>
                <select id="newIconSelect">
                    <option value="✨">✨ Işık</option>
                    <option value="⚡">⚡ Hız</option>
                    <option value="📱">📱 Mobil</option>
                    <option value="🎨">🎨 Tasarım</option>
                    <option value="🔒">🔒 Güvenlik</option>
                    <option value="🚀">🚀 Entegrasyon</option>
                    <option value="🌟">🌟 Yıldız</option>
                    <option value="💡">💡 Fikir</option>
                    <option value="🔥">🔥 Trend</option>
                    <option value="🎯">🎯 Hedef</option>
                    <option value="custom">✏️ Özel</option>
                </select>
                <input type="text" id="newIconCustom" placeholder="Özel ikon" style="display:none; margin-top:3px;">
            </div>
            <div class="form-group">
                <label>Başlık *</label>
                <input type="text" id="newTitle" placeholder="Kart başlığı">
            </div>
            <div class="form-group">
                <label>Açıklama</label>
                <textarea id="newDesc" rows="1" placeholder="Kısa açıklama"></textarea>
            </div>
            <div class="form-group">
                <label>Link (URL)</label>
                <input type="text" id="newLink" placeholder="https://...">
            </div>
            <div class="form-group">
                <label style="display: flex; align-items: center; gap:5px;">
                    <input type="checkbox" id="newShowUrl"> URL göster
                </label>
            </div>
            <button id="addCardBtn">➕ Ekle</button>
        </div>
    </div>

    <!-- Giriş Formu (başlangıçta gösterilecek) -->
    <div id="authPanel" class="auth-card">
        <h2>🔐 Yönetici Girişi</h2>
        <input type="email" id="loginEmail" placeholder="E-posta" value="esahin.ast@gmail.com">
        <input type="password" id="loginPassword" placeholder="Şifre">
        <button id="loginBtn">Giriş Yap</button>
        <button id="forgotPwdBtn" class="link-btn">Şifremi unuttum</button>
        <div class="small-text" style="margin-top: 1rem;">Sadece yetkili personel giriş yapabilir.</div>
    </div>
</div>

<!-- Şifre değiştirme modal -->
<div id="changePwdModal" class="modal">
    <div class="modal-content">
        <h3>Şifre Değiştir</h3>
        <input type="password" id="oldPassword" placeholder="Mevcut şifre">
        <input type="password" id="newPassword" placeholder="Yeni şifre">
        <input type="password" id="confirmPassword" placeholder="Yeni şifre (tekrar)">
        <button id="confirmChangePwd">Güncelle</button>
        <button id="closeModalBtn" class="link-btn">İptal</button>
        <div id="pwdMessage" class="small-text" style="margin-top: 0.5rem;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, writeBatch } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, updatePassword, signOut, onAuthStateChanged, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCloL8IN0NpHQBxFjaRH_62vOEWjLQjr4o",
        authDomain: "duapro-a7d7e.firebaseapp.com",
        projectId: "duapro-a7d7e",
        storageBucket: "duapro-a7d7e.appspot.com",
        messagingSenderId: "450775848659",
        appId: "1:450775848659:web:ca192a401da3f887e1e626"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const FEATURES_COLLECTION = "featureCards";

    let allCards = [];
    let currentUser = null;

    // ---------- Firestore işlemleri (mevcut) ----------
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function loadCards() {
        const snapshot = await getDocs(collection(db, FEATURES_COLLECTION));
        const cards = [];
        snapshot.forEach(docSnap => {
            let data = docSnap.data();
            cards.push({
                id: docSnap.id,
                icon: data.icon || '✨',
                title: data.title || '',
                description: data.description || '',
                link: data.link || '',
                showLinkAsUrl: data.showLinkAsUrl === true,
                active: data.active !== false,
                order: typeof data.order === 'number' ? data.order : 9999,
                createdAt: data.createdAt || Date.now()
            });
        });
        cards.sort((a,b) => a.order - b.order);
        allCards = cards;
        applyFilterAndRender();
    }

    function applyFilterAndRender() {
        let filtered = [...allCards];
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const activeFilter = document.getElementById('filterActive').value;
        const sortBy = document.getElementById('sortBy').value;

        if (searchTerm) {
            filtered = filtered.filter(c => c.title.toLowerCase().includes(searchTerm) || (c.link && c.link.toLowerCase().includes(searchTerm)));
        }
        if (activeFilter === 'active') filtered = filtered.filter(c => c.active === true);
        if (activeFilter === 'inactive') filtered = filtered.filter(c => c.active === false);

        if (sortBy === 'title') filtered.sort((a,b) => a.title.localeCompare(b.title));
        if (sortBy === 'date') filtered.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
        if (sortBy === 'order') filtered.sort((a,b) => a.order - b.order);

        renderCards(filtered);
        document.getElementById('cardCount').innerText = `${filtered.length} / ${allCards.length} kart`;
    }

    function renderCards(cards) {
        const container = document.getElementById('cardsContainer');
        if (!cards.length) {
            container.innerHTML = '<div class="small-text" style="padding:1rem;">📭 Henüz kart yok. Yeni ekleyin.</div>';
            return;
        }
        let html = '';
        cards.forEach(card => {
            const activeClass = card.active ? '' : 'inactive';
            const linkPreview = card.link ? (card.link.length > 40 ? card.link.substr(0,40)+'…' : card.link) : 'Bağlantı yok';
            html += `
                <div class="card-row ${activeClass}" data-id="${card.id}">
                    <div class="row-fields">
                        <input type="checkbox" class="checkbox-select card-select" data-id="${card.id}" style="width:18px; margin:0 5px 0 0;">
                        <div class="field-icon">${escapeHtml(card.icon)}</div>
                        <div class="field-title">${escapeHtml(card.title)}</div>
                        <div class="field-link">🔗 ${escapeHtml(linkPreview)}</div>
                        <div class="field-check">
                            <label style="display:flex; align-items:center; gap:3px;">
                                <input type="checkbox" class="active-toggle" data-id="${card.id}" ${card.active ? 'checked' : ''}> Aktif
                            </label>
                        </div>
                        <div class="action-buttons">
                            <button class="btn-icon move-up" data-id="${card.id}" ${cards.indexOf(card) === 0 ? 'disabled' : ''}>▲</button>
                            <button class="btn-icon move-down" data-id="${card.id}" ${cards.indexOf(card) === cards.length-1 ? 'disabled' : ''}>▼</button>
                            <button class="btn-icon duplicate-btn" data-id="${card.id}">📋 Çoğalt</button>
                            <button class="btn-icon expand-btn" data-id="${card.id}">✏️ Detay</button>
                            <button class="btn-icon btn-danger delete-btn" data-id="${card.id}">🗑</button>
                        </div>
                    </div>
                    <div class="expand-details" id="expand-${card.id}">
                        <label>İkon:</label><input type="text" class="edit-icon" data-id="${card.id}" value="${escapeHtml(card.icon)}">
                        <label>Başlık:</label><input type="text" class="edit-title" data-id="${card.id}" value="${escapeHtml(card.title)}">
                        <label>Açıklama:</label><textarea class="edit-desc" data-id="${card.id}" rows="2">${escapeHtml(card.description)}</textarea>
                        <label>Link:</label><input type="text" class="edit-link" data-id="${card.id}" value="${escapeHtml(card.link)}">
                        <label>URL göster:</label><input type="checkbox" class="edit-showUrl" data-id="${card.id}" ${card.showLinkAsUrl ? 'checked' : ''}>
                        <div style="grid-column:1/-1; text-align:right;">
                            <button class="btn-icon save-details" data-id="${card.id}">💾 Kaydet</button>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;

        // Olay bağlantıları (kısa gösterim için aynı mantık)
        attachEvents();
    }

    function attachEvents() {
        document.querySelectorAll('.active-toggle').forEach(cb => {
            cb.addEventListener('change', async (e) => {
                const id = cb.dataset.id;
                const active = cb.checked;
                await updateDoc(doc(db, FEATURES_COLLECTION, id), { active });
                await loadCards();
            });
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                if (confirm('Bu kartı silmek istediğinize emin misiniz?')) {
                    await deleteDoc(doc(db, FEATURES_COLLECTION, btn.dataset.id));
                    await loadCards();
                }
            });
        });
        document.querySelectorAll('.duplicate-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = btn.dataset.id;
                const original = allCards.find(c => c.id === id);
                if (original) {
                    const newOrder = allCards.length + 1;
                    await addDoc(collection(db, FEATURES_COLLECTION), {
                        icon: original.icon,
                        title: original.title + ' (kopya)',
                        description: original.description,
                        link: original.link,
                        showLinkAsUrl: original.showLinkAsUrl,
                        active: original.active,
                        order: newOrder,
                        createdAt: Date.now()
                    });
                    await loadCards();
                }
            });
        });
        document.querySelectorAll('.move-up, .move-down').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = btn.dataset.id;
                const currentCards = [...allCards].sort((a,b) => a.order - b.order);
                const index = currentCards.findIndex(c => c.id === id);
                if (index === -1) return;
                const newIndex = btn.classList.contains('move-up') ? index-1 : index+1;
                if (newIndex < 0 || newIndex >= currentCards.length) return;
                const card1 = currentCards[index];
                const card2 = currentCards[newIndex];
                const batch = writeBatch(db);
                batch.update(doc(db, FEATURES_COLLECTION, card1.id), { order: card2.order });
                batch.update(doc(db, FEATURES_COLLECTION, card2.id), { order: card1.order });
                await batch.commit();
                await loadCards();
            });
        });
        document.querySelectorAll('.expand-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const div = document.getElementById(`expand-${btn.dataset.id}`);
                div.classList.toggle('active');
            });
        });
        document.querySelectorAll('.save-details').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = btn.dataset.id;
                const newIcon = document.querySelector(`.edit-icon[data-id="${id}"]`).value;
                const newTitle = document.querySelector(`.edit-title[data-id="${id}"]`).value;
                const newDesc = document.querySelector(`.edit-desc[data-id="${id}"]`).value;
                const newLink = document.querySelector(`.edit-link[data-id="${id}"]`).value;
                const newShowUrl = document.querySelector(`.edit-showUrl[data-id="${id}"]`).checked;
                await updateDoc(doc(db, FEATURES_COLLECTION, id), {
                    icon: newIcon,
                    title: newTitle,
                    description: newDesc,
                    link: newLink,
                    showLinkAsUrl: newShowUrl
                });
                await loadCards();
            });
        });
    }

    async function addCard() {
        let icon = document.getElementById('newIconSelect').value;
        if (icon === 'custom') {
            icon = document.getElementById('newIconCustom').value.trim();
            if (!icon) icon = '✨';
        }
        const title = document.getElementById('newTitle').value.trim();
        const desc = document.getElementById('newDesc').value.trim();
        let link = document.getElementById('newLink').value.trim();
        const showUrl = document.getElementById('newShowUrl').checked;

        if (!title) { alert('Başlık gerekli'); return; }
        if (link && !link.startsWith('http')) link = 'https://' + link;

        const newOrder = allCards.length + 1;
        await addDoc(collection(db, FEATURES_COLLECTION), {
            icon, title, description: desc, link, showLinkAsUrl: showUrl,
            active: true, order: newOrder, createdAt: Date.now()
        });
        document.getElementById('newTitle').value = '';
        document.getElementById('newDesc').value = '';
        document.getElementById('newLink').value = '';
        document.getElementById('newIconCustom').value = '';
        document.getElementById('newShowUrl').checked = false;
        await loadCards();
    }

    async function bulkDelete() {
        const selected = Array.from(document.querySelectorAll('.card-select:checked')).map(cb => cb.dataset.id);
        if (!selected.length) { alert('Hiç kart seçilmedi'); return; }
        if (confirm(`${selected.length} kartı silmek istediğinize emin misiniz?`)) {
            const batch = writeBatch(db);
            selected.forEach(id => batch.delete(doc(db, FEATURES_COLLECTION, id)));
            await batch.commit();
            await loadCards();
        }
    }

    // ---------- Auth İşlemleri ----------
    function showAuthPanel() {
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('authPanel').style.display = 'block';
    }
    function showMainContent() {
        document.getElementById('authPanel').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        loadCards(); // giriş yapınca kartları yükle
    }

    async function login(email, password) {
        try {
            await signInWithEmailAndPassword(auth, email, password);
            // başarılı, onAuthStateChanged zaten tetiklenecek
        } catch (error) {
            alert('Giriş başarısız: ' + error.message);
        }
    }

    async function resetPassword(email) {
        try {
            await sendPasswordResetEmail(auth, email);
            alert('Şifre sıfırlama maili gönderildi. Lütfen e-posta kutunuzu kontrol edin.');
        } catch (error) {
            alert('Hata: ' + error.message);
        }
    }

    async function changePassword(oldPwd, newPwd) {
        const user = auth.currentUser;
        if (!user) return;
        const credential = EmailAuthProvider.credential(user.email, oldPwd);
        try {
            await reauthenticateWithCredential(user, credential);
            await updatePassword(user, newPwd);
            alert('Şifre başarıyla güncellendi.');
            closeModal();
        } catch (error) {
            document.getElementById('pwdMessage').innerText = 'Hata: ' + error.message;
        }
    }

    function logout() {
        signOut(auth).then(() => {
            // çıkış yapıldı, auth durumu değişecek
        });
    }

    // Modal kontrol
    const modal = document.getElementById('changePwdModal');
    function openModal() { modal.style.display = 'flex'; }
    function closeModal() { modal.style.display = 'none'; document.getElementById('pwdMessage').innerText = ''; }

    // Auth durumu dinle
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('userEmail').innerText = user.email;
            showMainContent();
        } else {
            currentUser = null;
            showAuthPanel();
        }
    });

    // DOM elemanlarına olay bağlama
    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value;
        const pwd = document.getElementById('loginPassword').value;
        login(email, pwd);
    });
    document.getElementById('forgotPwdBtn').addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value;
        if (!email) { alert('E-posta adresinizi girin.'); return; }
        resetPassword(email);
    });
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('changePwdBtn').addEventListener('click', openModal);
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('confirmChangePwd').addEventListener('click', () => {
        const oldPwd = document.getElementById('oldPassword').value;
        const newPwd = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        if (!oldPwd || !newPwd || newPwd !== confirm) {
            alert('Lütfen tüm alanları doldurun ve yeni şifrelerin eşleştiğinden emin olun.');
            return;
        }
        changePassword(oldPwd, newPwd);
    });
    // Modal dışına tıklayınca kapat
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    // Diğer butonlar
    document.getElementById('refreshBtn').addEventListener('click', () => loadCards());
    document.getElementById('bulkDeleteBtn').addEventListener('click', bulkDelete);
    document.getElementById('addCardBtn').addEventListener('click', addCard);
    document.getElementById('searchInput').addEventListener('input', () => applyFilterAndRender());
    document.getElementById('filterActive').addEventListener('change', () => applyFilterAndRender());
    document.getElementById('sortBy').addEventListener('change', () => applyFilterAndRender());
    document.getElementById('newIconSelect').addEventListener('change', (e) => {
        const customInput = document.getElementById('newIconCustom');
        customInput.style.display = e.target.value === 'custom' ? 'block' : 'none';
    });

    // Service Worker kaydı (isteğe bağlı)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW kaydı başarısız:', err));
    }
</script>
</body>
</html>
