<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
<title>Manevi Bilgi Oyunu 🌙</title>
<!-- Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕌</text></svg>">
<!-- Font Awesome 6 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<!-- Google Font: Poppins -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
<!-- howler.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
<!-- Sweet Alert 2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
/* ---------- RESET & DEĞİŞKENLER ---------- */
* { margin:0; padding:0; box-sizing: border-box; font-family:'Poppins', sans-serif; }
:root {
    --pastel-pink:#fbe9f0; --pastel-green:#e0f2e6; --accent:#7c3aed; --accent-soft:#a78bfa;
    --card-bg:rgba(255,255,255,0.8); --text-dark:#1f2937; --text-light:#f3f4f6;
    --border-light:#e2e8f0; --shadow:0 20px 40px rgba(0,0,0,0.05);
    --border-radius-lg:48px; --border-radius-md:24px;
}

body {
    background:linear-gradient(145deg,var(--pastel-pink),var(--pastel-green));
    min-height:100vh; display: flex; justify-content: center; align-items: center;
    padding:16px; transition: background 0.3s, color 0.2s; color:var(--text-dark);
    padding-bottom: 100px; /* Alt bar için boşluk */
}

/* Dark Mode */
body.dark-theme { background:linear-gradient(145deg,#0b1a2e,#04111f); color:#ffffff; }
body.dark-theme .game-container, body.dark-theme .intro-card, body.dark-theme .leaderboard-panel,
body.dark-theme .achievements-panel, body.dark-theme .admin-panel, body.dark-theme .game-over-card,
body.dark-theme .bottom-nav {
    background:rgba(15,30,45,0.95) !important; backdrop-filter:blur(10px); border-color:#3a4a5a!important; color:#ffffff!important;
}
body.dark-theme .bottom-nav { box-shadow: 0 10px 20px rgba(0,0,0,0.5) !important; }
body.dark-theme .option-btn { background: #1e293b; border-color: #475569; color: white; }
body.dark-theme .level-badge.active { background:#2c5f3a!important; }
body.dark-theme .level-badge.locked { background:#3a3a3a!important; color:#aaa!important; }

/* ---------- YENİ BOTTOM NAV BAR ---------- */
.bottom-nav {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    width: 95%; max-width: 500px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(12px);
    border: 3px solid #ffe0b0;
    border-radius: 60px;
    padding: 8px 15px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 20000;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    transition: all 0.3s ease;
}

.bottom-nav-group { display: flex; align-items: center; gap: 10px; }

/* Nav Butonları */
.nav-btn {
    width: 45px; height: 45px; border-radius: 50%; border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; cursor: pointer; transition: all 0.2s;
    background: #f3f4f6; color: #7c3aed; box-shadow: 0 4px 0 #d1d5db;
}
.nav-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #d1d5db; }

/* PWA Butonu */
.pwa-btn {
    width: auto; padding: 0 20px; border-radius: 30px;
    background: #7c3aed; color: white; font-weight: 600; font-size: 0.9rem;
    box-shadow: 0 4px 0 #5b21b6; display: none; /* JS ile açılacak */
}

/* Çıkış Butonu (Başlangıçta gizli) */
.exit-btn {
    background: #ffb7b7; color: #631e1e; box-shadow: 0 4px 0 #b47272;
    display: none;
}

/* Maskot (Nav içinde) */
.nav-mascot {
    font-size: 2rem; cursor: pointer; display: flex; align-items: center;
    transition: transform 0.2s;
}
.nav-mascot:active { transform: scale(0.9); }
.mascot-eyes { display: inline-block; margin-left: -5px; animation: blink 4s infinite; }

/* Eski Maskot ve Ses Butonunu Gizle */
#mascot, #soundToggleBtn, #pwa-install-container { display: none !important; }

/* ---------- GENEL STİLLER (ESKİ KODDAN) ---------- */
.intro-overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.2); backdrop-filter:blur(12px);
    display: flex; justify-content: center; align-items: center;
    z-index:10000; transition:0.3s; padding:16px;
}
.intro-overlay.hidden { visibility: hidden; opacity:0; pointer-events: none; }

.intro-card {
    background:var(--card-bg); border-radius:var(--border-radius-lg); padding:30px;
    width:100%; max-width:800px; max-height:85vh; overflow-y: auto;
    box-shadow:0 30px 0 #ffe0b5; border:4px solid #ffe8d9;
    display: flex; flex-direction: column; gap:20px;
}

.intro-play-btn {
    background:#ffe69b; border:3px solid #ffe0b0; border-radius:80px; padding:16px;
    font-size:1.5rem; font-weight:700; color:#5e4b3c; width:100%;
    display: flex; align-items: center; justify-content: center; gap:10px;
    box-shadow:0 10px 0 #d4a373; cursor: pointer; transition:0.1s;
}

.game-container {
    background:var(--card-bg); backdrop-filter:blur(10px); border-radius:var(--border-radius-lg);
    padding:20px; box-shadow:var(--shadow); border:1px solid rgba(255,255,255,0.5);
    width:100%; max-width:1000px; margin-top:-5%; display: none;
}

.top-bar {
    display: flex; align-items: center; justify-content: space-between; gap:8px;
    margin-bottom:16px; background:rgba(255,255,255,0.4); padding:6px 12px;
    border-radius:60px; border:2px solid #ffe0b0; flex-wrap: wrap;
}
.left-group { display: flex; align-items: center; gap:10px; }
.right-group { display: flex; align-items: center; gap:6px; margin-left: auto; }
.user-avatar {
    width:40px; height:40px; border-radius:50%; background:#ffe6c7;
    display: flex; align-items: center; justify-content: center; font-size:1.8rem;
    border:2px solid white; box-shadow:0 3px 0 #d4a373;
}
.stat-box {
    background: white; padding:4px 10px; border-radius:30px;
    box-shadow:0 3px 0 #cbd5e0; border:1px solid #cbd5e0;
    font-weight:600; display: flex; align-items: center; gap:4px;
    color:#2d3e50; font-size:0.8rem;
}
.action-btn {
    background:rgba(255,255,255,0.7); border:2px solid #ffe0b0; border-radius:30px;
    padding:4px 10px; font-size:0.8rem; cursor: pointer;
    display: flex; align-items: center; gap:4px; color:#4a5a6a;
}
.report-btn {
    background: none; border: none; font-size: 1rem; color: #7c3aed; cursor: pointer;
}

.levels-wrapper { overflow-x: auto; margin-bottom:20px; padding-bottom:5px; }
.levels-container { display: flex; gap:10px; padding:5px; }
.level-badge {
    width:50px; height:50px; border-radius:50%; background: white;
    display: flex; justify-content: center; align-items: center; font-weight:700;
    box-shadow:0 5px 0 #b0c4ce; border:2px solid #ffe9e9; flex-shrink:0; cursor: pointer;
}
.level-badge.active { background:#b5e6c3; box-shadow:0 5px 0 #6b9e7a; color:#1e3a2f; }
.level-badge.locked { background:#e0e0e0; opacity:0.7; pointer-events: none; }

.question-card {
    background: white; border-radius:32px; padding:25px 20px; margin-top:25px;
    box-shadow:0 8px 0 #e2e8f0; border:2px solid #edf2f7; position: relative;
}
.question-text { font-size:1.4rem; font-weight:600; color:#2d3e50; margin-bottom:15px; padding-right:60px; }
.timer {
    position: absolute; top:-25px; right:20px; background:#ffe2cc; border-radius:30px;
    padding:5px 12px; font-weight:700; border:2px solid #ffb08c; box-shadow:0 3px 0 #d48c6b; color:#5e3e2e;
}
.hint-btn {
    background:#ffeaa5; border:none; border-radius:30px; padding:5px 10px;
    font-size:1rem; font-weight:600; color:#6b4f1a; cursor:pointer;
    box-shadow:0 5px 0 #d4a373; margin-bottom: 10px;
}
.options-grid { display: grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px; }
.option-btn {
    background: #fff6e6; border: 3px solid #ffdab9; border-radius: 16px; padding: 12px;
    font-weight: 500; color: #3a4e5e; cursor: pointer; box-shadow: 0 4px 0 #e6c4a8; text-align: left;
}
.option-btn.correct { background: #c8e6c9; border-color: #81c784; box-shadow: 0 4px 0 #519657; }
.option-btn.wrong { background: #ffcdd2; border-color: #e57373; box-shadow: 0 4px 0 #b71c1c; }
.option-btn.eliminated { opacity: 0.3; pointer-events: none; text-decoration: line-through; }
.next-btn {
    background: #b2d8d8; border: none; border-radius: 30px; padding: 10px 20px;
    font-weight: 600; color: #1e4a4a; width: 100%; box-shadow: 0 5px 0 #6b9e9e; cursor: pointer;
}
.next-btn.active { background: #ffe69b; box-shadow: 0 5px 0 #d4a373; color: #5e4b3c; }

/* Modallar */
.leaderboard-panel, .achievements-panel, .admin-panel {
    position: fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background: white; border-radius:48px; padding:25px; width:95%; max-width:1000px;
    max-height:90vh; overflow-y: auto; z-index:10002;
    box-shadow:0 20px 0 #ffe0b5; border:4px solid #ffe8d9; visibility: hidden; opacity:0;
}
.active { visibility: visible; opacity:1; }

.intro-settings-panel { display: none; margin-top: 10px; }
.intro-settings-panel.active { display: block; }
.avatar-option { width:50px; height:50px; border-radius:50%; border:3px solid #eee; display:flex; justify-content:center; align-items:center; font-size:1.5rem; cursor:pointer; }
.avatar-option.selected { border-color: #7c3aed; background: #e0d4fc; }

/* Admin Stilleri */
.admin-split { display: grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px; }
.admin-left, .admin-right { background:#fef9e0; border-radius:24px; padding:20px; border:2px solid #ffe0b0; }
.admin-question-item { background:white; padding:10px; margin-bottom:10px; border-radius:15px; border:1px solid #ddd; display:flex; justify-content:space-between; }
.admin-right input, .admin-right select { width:100%; padding:10px; margin-bottom:10px; border-radius:20px; border:2px solid #ccc; }

/* Animasyonlar */
@keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
.toast-message {
    position: fixed; top:15px; left:50%; transform:translateX(-50%);
    background: white; padding:10px 20px; border-radius:50px; font-weight:600;
    box-shadow:0 8px 15px rgba(0,0,0,0.1); z-index:100000; border:2px solid #ffe0b0;
}

/* Responsive */
@media (max-width:768px) {
    .admin-split { grid-template-columns: 1fr; }
    .bottom-nav { width: 95%; padding: 6px 12px; }
    .nav-btn { width: 40px; height: 40px; font-size: 1.1rem; }
    .question-text { font-size: 1.1rem; }
    .options-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ========== YENİ BOTTOM NAV BAR (HİZALI VE SABİT) ========= -->
<div class="bottom-nav">
    <div class="bottom-nav-group">
        <!-- Maskot -->
        <div id="navMascot" class="nav-mascot">
            🐻 <span class="mascot-eyes">👀</span>
        </div>
        <!-- PWA İndir Butonu (Otomatik Gelir) -->
        <button id="pwaInstallBtn" class="nav-btn pwa-btn">
            <i class="fas fa-download"></i>&nbsp;Yükle
        </button>
    </div>

    <div class="bottom-nav-group">
        <!-- Çıkış Butonu (Sadece oyundayken görünür) -->
        <button id="navExitBtn" class="nav-btn exit-btn" title="Ana Menüye Dön">
            <i class="fas fa-sign-out-alt"></i>
        </button>
        <!-- Ses Butonu -->
        <button id="navSoundBtn" class="nav-btn" title="Ses Aç/Kapa">
            <i class="fas fa-volume-up"></i>
        </button>
    </div>
</div>

<!-- ========== INTRO EKRANI ========= -->
<div id="introOverlay" class="intro-overlay">
    <div class="intro-card">
        <div class="intro-user-header">
            <div id="introAvatar" class="intro-avatar">🐻</div>
            <div class="intro-user-details" style="flex:1; margin-left:10px;">
                <div id="introUserName" style="font-weight:700; font-size:1.2rem;">Misafir</div>
                <div id="introUserStats" style="font-size:0.85rem; color:#6b7280;">
                    <span><i class="fas fa-crown"></i> Sv. <span id="introLevel">1</span></span>
                    <span style="margin-left:10px;"><i class="fas fa-star"></i> Puan <span id="introScore">0</span></span>
                </div>
            </div>
            <button id="introSettingsBtn" style="background:none; border:none; font-size:1.5rem; color:#7c3aed; cursor:pointer;">
                <i class="fas fa-cog"></i>
            </button>
        </div>

        <div class="intro-leaderboard-preview" style="background:rgba(255,255,255,0.5); border-radius:24px; padding:15px; border:2px solid #ffe0b0;">
            <h4 style="color:#7c3aed; margin-bottom:10px;"><i class="fas fa-trophy"></i> En İyiler</h4>
            <button id="viewLeaderboardBtn" style="width:100%; background:white; border:2px solid #ffe0b0; padding:8px; border-radius:30px; font-weight:600; cursor:pointer; color:#5e4b3c;">
                <i class="fas fa-list-ol"></i> Lider Tablosunu Gör
            </button>
        </div>
        
        <div class="intro-achievements-preview" style="background:rgba(255,255,255,0.5); border-radius:24px; padding:15px; border:2px solid #ffe0b0;">
             <h4 style="color:#7c3aed;"><i class="fas fa-medal"></i> Rozetlerim</h4>
             <div id="introAchievementsList">Yükleniyor...</div>
        </div>

        <button id="introStartGameBtn" class="intro-play-btn">
            <i class="fas fa-play"></i> OYUNA BAŞLA
        </button>

        <!-- Intro Settings Panel -->
        <div id="introSettingsPanel" class="intro-settings-panel">
            <h4>Profil Düzenle</h4>
            <input type="text" id="settingsUsername" placeholder="İsim Giriniz" style="width:100%; padding:10px; border-radius:20px; border:2px solid #ffe0b0;">
            <div style="margin:10px 0;">Avatar Seç:</div>
            <div id="settingsAvatarSelector" style="display:flex; gap:10px; flex-wrap:wrap;"></div>
            <button id="saveSettingsBtn" style="margin-top:10px; background:#b5e6c3; padding:10px; border-radius:20px; border:none; cursor:pointer;">Kaydet</button>
            <button id="closeSettingsBtn" style="margin-top:10px; background:#ffe0b0; padding:10px; border-radius:20px; border:none; cursor:pointer;">Kapat</button>
        </div>
    </div>
</div>

<!-- ========== OYUN KONTEYNERİ ========= -->
<div id="gameContainer" class="game-container">
    <div class="top-bar">
        <div class="left-group">
            <div id="gameAvatar" class="user-avatar">🐻</div>
            <div id="gameUserName" class="user-name" style="font-weight:700;">Misafir</div>
        </div>
        <div class="right-group">
            <div class="stat-box"><i class="fas fa-star" style="color:#ff9f1c;"></i> <span id="scoreDisplay">0</span></div>
            <div class="stat-box"><i class="fas fa-crown" style="color:#ff9f1c;"></i> <span id="currentLevelDisplay">1</span></div>
            <button id="reportBugBtn" class="report-btn" title="Hata Bildir"><i class="fas fa-exclamation-circle"></i></button>
            <button id="leaderboardBtn" class="action-btn"><i class="fas fa-trophy"></i></button>
            <button id="achievementsBtn" class="action-btn"><i class="fas fa-medal"></i></button>
            <button id="settingsBtn" class="action-btn"><i class="fas fa-moon"></i></button>
        </div>
    </div>

    <!-- Seviye İlerleme -->
    <div class="levels-wrapper">
        <div id="levelIndicators" class="levels-container"></div>
    </div>

    <!-- Soru Kartı -->
    <div id="questionCard" class="question-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; margin-top:-50px;">
            <div id="timer" class="timer">
                <i class="fas fa-hourglass-half"></i> <span id="timerSeconds">60</span>sn
            </div>
            <button id="hintButton" class="hint-btn">
                <i class="fas fa-lightbulb"></i> İpucu
            </button>
        </div>
        <div id="questionText" class="question-text">Soru yükleniyor...</div>
        <div id="optionsContainer" class="options-grid"></div>
        <button id="nextButton" class="next-btn disabled"><i class="fas fa-arrow-right"></i> İleri</button>
    </div>
</div>

<!-- ========== LİDERLİK PANELİ ========= -->
<div id="leaderboardPanel" class="leaderboard-panel">
    <h2 style="color: #7c3aed; margin-bottom: 20px;"><i class="fas fa-trophy"></i> Liderlik</h2>
    <div id="leaderboardList"></div>
    <button id="closeLeaderboardBtn" class="nav-btn" style="width:100%; border-radius:20px; font-size:1rem; margin-top:20px;">Kapat</button>
</div>

<!-- ========== BAŞARIM PANELİ ========= -->
<div id="achievementsPanel" class="achievements-panel">
    <h2 style="color: #7c3aed; margin-bottom: 20px;"><i class="fas fa-medal"></i> Rozetlerim</h2>
    <div id="achievementsList"></div>
    <button id="closeAchievementsBtn" class="nav-btn" style="width:100%; border-radius:20px; font-size:1rem; margin-top:20px;">Kapat</button>
</div>

<!-- ========== ADMIN PANELİ ========= -->
<div id="adminPanel" class="admin-panel">
    <h2 style="color: #7c3aed; text-align:center;"><i class="fas fa-lock"></i> Admin Paneli</h2>
    <div class="admin-split">
        <div class="admin-left">
            <h3>Sorular</h3>
            <div id="adminStats" style="margin-bottom:10px; font-size:0.9rem;"></div>
            <div id="adminQuestionsList" style="max-height:300px; overflow-y:auto;"></div>
            <button id="bulkAddQuestionsBtn" style="width:100%; background:#b5e6c3; padding:10px; border:none; border-radius:20px; cursor:pointer; margin-top:10px;">Toplu Soru Ekle</button>
            <button id="clearLeaderboardBtn" style="width:100%; background:#ffb7b7; padding:10px; border:none; border-radius:20px; cursor:pointer; margin-top:5px;">Liderliği Sıfırla</button>
            <button id="resetAllUserDataBtn" style="width:100%; background:#ffb7b7; padding:10px; border:none; border-radius:20px; cursor:pointer; margin-top:5px;">Her Şeyi Sıfırla</button>
        </div>
        <div class="admin-right">
            <h3 id="formTitle">Yeni Soru Ekle</h3>
            <input type="text" id="adminSoru" placeholder="Soru Metni">
            <input type="text" id="adminSecenek1" placeholder="A Şıkkı">
            <input type="text" id="adminSecenek2" placeholder="B Şıkkı">
            <input type="text" id="adminSecenek3" placeholder="C Şıkkı">
            <input type="text" id="adminSecenek4" placeholder="D Şıkkı">
            <select id="adminDogru">
                <option value="0">A Doğru</option><option value="1">B Doğru</option>
                <option value="2">C Doğru</option><option value="3">D Doğru</option>
            </select>
            <select id="adminKategori"><option>Kur'an</option><option>Namaz</option><option>Peygamberler</option></select>
            <select id="adminZorluk"><option value="1">Kolay</option><option value="2">Orta</option><option value="3">Zor</option></select>
            <div style="display:flex; gap:10px;">
                <button id="saveQuestionBtn" style="flex:1; background:#b5e6c3; padding:10px; border:none; border-radius:20px; cursor:pointer;">Kaydet</button>
                <button id="cancelEditBtn" style="flex:1; background:#ffe0b0; padding:10px; border:none; border-radius:20px; cursor:pointer; display:none;">İptal</button>
            </div>
        </div>
    </div>
    <button id="closeAdminBtn" style="width:100%; padding:12px; margin-top:20px; background:#ddd; border:none; border-radius:30px; cursor:pointer;">Kapat</button>
</div>

<!-- ========== OYUN BİTTİ MODAL ========= -->
<div id="gameOverModal" class="intro-overlay hidden">
    <div class="intro-card" style="max-width:400px; height:auto; text-align:center;">
        <h2 style="color:#e53e3e;"><i class="fas fa-heart-broken"></i> Oyun Bitti</h2>
        <p id="gameOverMessage">Maalesef...</p>
        <button id="restartGameBtn" class="intro-play-btn" style="font-size:1rem; margin-top:10px;">Tekrar Dene</button>
    </div>
</div>

<div id="toastContainer"></div>

<script type="module">
// ------------------------------------------------------------
// 1. FIREBASE & IMPORTLAR
// ------------------------------------------------------------
import { db } from './firebase-core.js';
import { collection, getDocs, addDoc, query, orderBy, limit, doc, getDoc, updateDoc, deleteDoc, where, writeBatch } 
from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';

// ------------------------------------------------------------
// 2. SABİTLER
// ------------------------------------------------------------
const QUESTIONS_COLLECTION = 'manevi_sorular';
const LEADERBOARD_COLLECTION = 'leaderboard';
const ADMIN_PASSWORD = '123'; // Admin şifresi
const STORAGE_KEY = 'maneviOyunSave';

const SAMPLE_QUESTIONS = [
    {bolum: 'Kur\'an', soru: 'Kur\'an-ı Kerim kaç cüzden oluşur?', secenekler: ['28','29','30','31'], dogru: 2, zorluk: 1},
    {bolum: 'Kur\'an', soru: 'Hangi sure Kur\'an\'ın kalbi olarak bilinir?', secenekler: ['Fatiha','Yasin','Rahman','Mülk'], dogru: 1, zorluk: 2},
    {bolum: 'Kur\'an', soru: 'Kur\'an\'da adı geçen tek sahabe kimdir?', secenekler: ['Ebu Bekir','Ömer','Zeyd','Üsame'], dogru: 2, zorluk: 2}
];

const AVATAR_LIST = [
    {name: 'Maşa', icon: '🐻'}, {name: 'Koca Ayı', icon: '🐨'},
    {name: 'Sonic', icon: '🦔'}, {name: 'Labubi', icon: '🐶'},
    {name: 'Mickey', icon: '🐭'}, {name: 'Minnie', icon: '🐹'},
    {name: 'Donald', icon: '🦆'}, {name: 'Goofy', icon: '🐕'}
];

const ACHIEVEMENT_NAMES = {
    firstCorrect: '🌱 Yeni Fidan', streak: '🌿 Yaprak', quranMaster: '🍃 Dal',
    namazkar: '🌳 Genç Ağaç', level5: '🌱 Acemi Bilge', level10: '🌿 Bilgelik Yolcusu',
    level20: '🌳 Manevi Fidan', level50: '👑 Manevi Alim'
};

// ------------------------------------------------------------
// 3. SES SİSTEMİ
// ------------------------------------------------------------
let soundEnabled = true;
const sounds = {
    correct: new Howl({src: ['https://cdn.freesound.org/previews/320/320655_5260872-lq.mp3']}),
    wrong: new Howl({src: ['https://cdn.freesound.org/previews/173/173326_2394245-lq.mp3']}), // Basit hata
    levelUp: new Howl({src: ['https://cdn.freesound.org/previews/411/411089_5121236-lq.mp3']})
};
function playSound(name){
    if(soundEnabled && sounds[name]) sounds[name].play();
}

// ------------------------------------------------------------
// 4. OYUN DEĞİŞKENLERİ (STATE)
// ------------------------------------------------------------
let gameState = {
    username: 'Misafir', avatar: '🐻', score: 0, currentLevel: 1,
    maxUnlockedLevel: 1, hintsUsed: 0, solvedQuestions: [],
    achievements: { firstCorrect: false, streak: 0, level5: false, level10: false, level20: false, level50: false },
    recentAchievements: [], darkMode: false
};
let allQuestions = [];
let currentLevelQuestions = [];
let currentQuestion = null;
let timerInterval = null;
let timeLeft = 60;
let answered = false;
let firstAttempt = true;
let editingQuestionId = null;

// ------------------------------------------------------------
// 5. BAŞLANGIÇ & KAYIT FONKSİYONLARI
// ------------------------------------------------------------
function loadGameState(){
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved){
        try {
            const parsed = JSON.parse(saved);
            gameState = { ...gameState, ...parsed };
            // Eksik alanları tamamla
            if(!gameState.achievements) gameState.achievements = {};
            if(!gameState.solvedQuestions) gameState.solvedQuestions = [];
        } catch(e){}
    }
}
function saveGameState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState)); }

async function seedQuestionsIfNeeded(){
    try {
        const q = query(collection(db, QUESTIONS_COLLECTION), limit(1));
        const snap = await getDocs(q);
        if(snap.empty) {
            for(const sq of SAMPLE_QUESTIONS) await addDoc(collection(db, QUESTIONS_COLLECTION), sq);
        }
    } catch(e){}
}

async function loadAllQuestions(){
    try {
        const q = query(collection(db, QUESTIONS_COLLECTION));
        const snap = await getDocs(q);
        allQuestions = [];
        snap.forEach(d => allQuestions.push({id: d.id, ...d.data()}));
        if(allQuestions.length === 0) allQuestions = SAMPLE_QUESTIONS.map((q,i)=>({id:`s-${i}`,...q}));
    } catch(e){
        allQuestions = SAMPLE_QUESTIONS.map((q,i)=>({id:`s-${i}`,...q}));
    }
}

// ------------------------------------------------------------
// 6. UI FONKSİYONLARI
// ------------------------------------------------------------
function updateUI(){
    // Intro
    document.getElementById('introAvatar').innerText = gameState.avatar;
    document.getElementById('introUserName').innerText = gameState.username;
    document.getElementById('introLevel').innerText = gameState.currentLevel;
    document.getElementById('introScore').innerText = gameState.score;
    // Game Header
    document.getElementById('gameAvatar').innerText = gameState.avatar;
    document.getElementById('gameUserName').innerText = gameState.username;
    document.getElementById('scoreDisplay').innerText = gameState.score;
    document.getElementById('currentLevelDisplay').innerText = gameState.currentLevel;
    // Achievements Preview
    let achHtml = '<ul style="list-style:none; padding:0; font-size:0.8rem;">';
    gameState.recentAchievements.slice(0,3).forEach(a => achHtml += `<li><i class="fas fa-medal text-warning"></i> ${a}</li>`);
    if(gameState.recentAchievements.length===0) achHtml+='<li>Henüz yok.</li>';
    document.getElementById('introAchievementsList').innerHTML = achHtml + '</ul>';
}

function showToast(msg, type='success'){
    const t = document.createElement('div');
    t.className = 'toast-message';
    t.style.background = type==='success'?'#d4edda':'#f8d7da';
    t.style.color = type==='success'?'#155724':'#721c24';
    t.innerHTML = msg;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(()=>t.remove(), 2500);
}

function initAvatarSelector(){
    const container = document.getElementById('settingsAvatarSelector');
    container.innerHTML = '';
    AVATAR_LIST.forEach(av => {
        const div = document.createElement('div');
        div.className = 'avatar-option';
        if(av.icon === gameState.avatar) div.classList.add('selected');
        div.innerText = av.icon;
        div.onclick = () => {
            gameState.avatar = av.icon;
            document.querySelectorAll('.avatar-option').forEach(x=>x.classList.remove('selected'));
            div.classList.add('selected');
        };
        container.appendChild(div);
    });
}

// ------------------------------------------------------------
// 7. OYUN AKIŞI
// ------------------------------------------------------------
function startGameFromIntro(){
    document.getElementById('introOverlay').classList.add('hidden');
    document.getElementById('gameContainer').style.display = 'block';
    document.getElementById('navExitBtn').style.display = 'flex'; // Çıkış butonunu göster
    
    // İlknur Kontrolü (User code logic)
    if(gameState.username.trim().toLowerCase() === 'ilknur'){
        Swal.fire({
            title: '❤️ Özel Mesaj ❤️', text: 'Ercan seni seviyor!',
            icon: 'success', confirmButtonColor: '#ff6b6b'
        });
    }

    loadLevelQuestions(gameState.currentLevel);
    renderLevelIndicators();
}

function exitToIntro(){
    document.getElementById('gameContainer').style.display = 'none';
    document.getElementById('introOverlay').classList.remove('hidden');
    document.getElementById('navExitBtn').style.display = 'none'; // Çıkış butonunu gizle
    clearInterval(timerInterval);
    updateUI();
}

function getQuestionCountForLevel(lvl) { return lvl * 2; }

function loadLevelQuestions(level){
    const needed = getQuestionCountForLevel(level);
    const unsolved = allQuestions.filter(q => !gameState.solvedQuestions.includes(q.id));
    
    // Yeterli soru yoksa çözülmüşlerden de al (tekrar modu gibi)
    const pool = unsolved.length >= needed ? unsolved : allQuestions;
    
    // Karıştır ve seç
    const shuffled = [...pool].sort(()=>Math.random()-0.5);
    currentLevelQuestions = shuffled.slice(0, needed);
    
    gameState.currentQuestionIndexInLevel = 0;
    gameState.hintsUsed = 0;
    document.getElementById('hintButton').classList.remove('disabled');
    loadQuestionAtIndex(0);
}

function loadQuestionAtIndex(idx){
    if(idx >= currentLevelQuestions.length) return;
    
    currentQuestion = currentLevelQuestions[idx];
    document.getElementById('questionText').innerText = currentQuestion.soru;
    const optsDiv = document.getElementById('optionsContainer');
    optsDiv.innerHTML = '';
    
    currentQuestion.secenekler.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<b>${['A','B','C','D'][i]}</b> ${opt}`;
        btn.onclick = () => handleOptionClick(i, btn);
        optsDiv.appendChild(btn);
    });
    
    answered = false;
    firstAttempt = true;
    startTimer(60);
    const nextBtn = document.getElementById('nextButton');
    nextBtn.classList.add('disabled');
    nextBtn.classList.remove('active');
}

function startTimer(sec){
    clearInterval(timerInterval);
    timeLeft = sec;
    const timerEl = document.getElementById('timerSeconds');
    timerEl.innerText = timeLeft;
    timerInterval = setInterval(()=>{
        timeLeft--;
        timerEl.innerText = timeLeft;
        if(timeLeft<=0){
            clearInterval(timerInterval);
            if(!answered) handleTimeOut();
        }
    },1000);
}

function handleTimeOut(){
    if(firstAttempt){
        showToast('⏳ Süre doldu! Son hakkın.', 'info');
        firstAttempt = false;
        startTimer(30); // Ek süre
    } else {
        document.getElementById('gameOverMessage').innerText = "Süre doldu!";
        document.getElementById('gameOverModal').classList.remove('hidden');
        document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));
    }
}

function handleOptionClick(idx, btn){
    if(answered) return;
    
    const isCorrect = (idx === currentQuestion.dogru);
    
    if(isCorrect){
        clearInterval(timerInterval);
        answered = true;
        btn.classList.add('correct');
        document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));
        playSound('correct');
        
        if(!gameState.solvedQuestions.includes(currentQuestion.id)){
            gameState.solvedQuestions.push(currentQuestion.id);
        }
        
        if(firstAttempt) {
            gameState.score += 10; // Tam puan
            confetti({particleCount: 50, spread: 60, origin: {y: 0.6}});
            checkAchievements('correct');
        } else {
            gameState.score += 5; // Yarım puan
        }
        saveGameState();
        
        const nextBtn = document.getElementById('nextButton');
        nextBtn.classList.remove('disabled');
        nextBtn.classList.add('active');
        document.getElementById('scoreDisplay').innerText = gameState.score;
        
    } else {
        playSound('wrong');
        btn.classList.add('wrong');
        btn.classList.add('disabled');
        
        if(firstAttempt){
            firstAttempt = false;
            showToast('❌ Yanlış! Bir hakkın daha var.', 'error');
        } else {
            clearInterval(timerInterval);
            document.getElementById('gameOverMessage').innerText = "İkinci denemede başarısız oldun.";
            document.getElementById('gameOverModal').classList.remove('hidden');
            document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));
        }
    }
}

function onNext(){
    const btn = document.getElementById('nextButton');
    if(!btn.classList.contains('active')) return;
    
    gameState.currentQuestionIndexInLevel++;
    if(gameState.currentQuestionIndexInLevel >= currentLevelQuestions.length){
        // Level Bitti
        gameState.maxUnlockedLevel = Math.max(gameState.maxUnlockedLevel, gameState.currentLevel + 1);
        gameState.currentLevel++;
        playSound('levelUp');
        showToast(`🎉 Seviye ${gameState.currentLevel} kilidi açıldı!`, 'success');
        
        // Rozet kontrolü (örn: level 5)
        const lvlKey = `level${gameState.currentLevel-1}`;
        if(ACHIEVEMENT_NAMES[lvlKey]) unlockAchievement(lvlKey);
        
        saveGameState();
        loadLevelQuestions(gameState.currentLevel);
        renderLevelIndicators();
        updateUI();
    } else {
        loadQuestionAtIndex(gameState.currentQuestionIndexInLevel);
    }
}

function useHint(){
    if(gameState.score < 5) { showToast('Yetersiz Puan! (5 gerekli)', 'error'); return; }
    if(gameState.hintsUsed >= 2) { showToast('Bu bölümde ipucu hakkın bitti.', 'error'); return; }
    
    // 2 yanlış şıkkı ele
    const wrongIndices = [0,1,2,3].filter(i => i !== currentQuestion.dogru);
    const toEliminate = wrongIndices.sort(()=>Math.random()-0.5).slice(0,2);
    
    const opts = document.getElementById('optionsContainer').children;
    toEliminate.forEach(i => {
        opts[i].classList.add('eliminated');
        opts[i].disabled = true;
    });
    
    gameState.score -= 5;
    gameState.hintsUsed++;
    document.getElementById('scoreDisplay').innerText = gameState.score;
    saveGameState();
    showToast('İpucu kullanıldı (-5 puan)', 'info');
}

// ------------------------------------------------------------
// 8. ROZET VE LİDERLİK
// ------------------------------------------------------------
function checkAchievements(action){
    if(action === 'correct'){
        gameState.achievements.streak = (gameState.achievements.streak || 0) + 1;
        if(!gameState.achievements.firstCorrect) unlockAchievement('firstCorrect');
        if(gameState.achievements.streak === 10) unlockAchievement('streak');
    }
}
function unlockAchievement(key){
    if(!gameState.achievements[key]){
        gameState.achievements[key] = true;
        const name = ACHIEVEMENT_NAMES[key] || key;
        gameState.recentAchievements.unshift(name);
        showToast(`🏆 Yeni Rozet: ${name}`, 'success');
        saveGameState();
    }
}
async function saveScoreToLeaderboard(){
    if(gameState.username === 'Misafir') return;
    try {
        await addDoc(collection(db, LEADERBOARD_COLLECTION), {
            username: gameState.username, score: gameState.score,
            level: gameState.currentLevel, timestamp: new Date()
        });
    } catch(e){}
}
async function loadLeaderboard(){
    const list = document.getElementById('leaderboardList');
    list.innerHTML = 'Yükleniyor...';
    try {
        const q = query(collection(db, LEADERBOARD_COLLECTION), orderBy('score', 'desc'), limit(10));
        const snap = await getDocs(q);
        let html = '<ol style="padding-left:20px;">';
        snap.forEach(d => {
            const inf = d.data();
            html += `<li style="margin-bottom:5px;"><b>${inf.username}</b>: ${inf.score} puan (Lv ${inf.level})</li>`;
        });
        list.innerHTML = html + '</ol>';
    } catch(e){ list.innerHTML = 'Hata oluştu.'; }
}

// ------------------------------------------------------------
// 9. ADMIN FONKSİYONLARI
// ------------------------------------------------------------
// Gizli Giriş: Avatar'a 5 kez tıkla
let adminClicks = 0;
function initAdminTrigger(){
    document.getElementById('gameAvatar').addEventListener('click', async () => {
        adminClicks++;
        setTimeout(()=>adminClicks=0, 3000);
        if(adminClicks === 5){
            const {value: pass} = await Swal.fire({title:'Admin Şifresi', input:'password'});
            if(pass === ADMIN_PASSWORD){
                document.getElementById('adminPanel').classList.add('active');
                loadAdminQuestions();
            }
        }
    });
}
async function loadAdminQuestions(){
    const list = document.getElementById('adminQuestionsList');
    list.innerHTML = 'Yükleniyor...';
    // Admin listesini yükle (basit versiyon)
    let html = '';
    allQuestions.forEach(q => {
        html += `<div class="admin-question-item">
            <span>${q.soru.substring(0,30)}...</span>
            <button onclick="window.deleteQ('${q.id}')" style="background:red; color:white; border:none; padding:5px; border-radius:5px;">Sil</button>
        </div>`;
    });
    list.innerHTML = html;
}

// Silme fonksiyonunu window'a ata (HTML onclick için)
window.deleteQ = async function(id){
    if(!confirm('Silinsin mi?')) return;
    try {
        await deleteDoc(doc(db, QUESTIONS_COLLECTION, id));
        showToast('Silindi');
        await loadAllQuestions();
        loadAdminQuestions();
    } catch(e){ showToast('Hata','error'); }
};

document.getElementById('bulkAddQuestionsBtn').addEventListener('click', async () => {
    Swal.showLoading();
    let count = 0;
    for(const q of SAMPLE_QUESTIONS){
        await addDoc(collection(db, QUESTIONS_COLLECTION), q);
        count++;
    }
    Swal.fire('Başarılı', `${count} soru eklendi`, 'success');
    await loadAllQuestions();
});

document.getElementById('saveQuestionBtn').addEventListener('click', async () => {
    const s = {
        soru: document.getElementById('adminSoru').value,
        secenekler: [
            document.getElementById('adminSecenek1').value,
            document.getElementById('adminSecenek2').value,
            document.getElementById('adminSecenek3').value,
            document.getElementById('adminSecenek4').value
        ],
        dogru: parseInt(document.getElementById('adminDogru').value),
        bolum: document.getElementById('adminKategori').value,
        zorluk: parseInt(document.getElementById('adminZorluk').value)
    };
    await addDoc(collection(db, QUESTIONS_COLLECTION), s);
    showToast('Soru Eklendi');
    document.getElementById('adminSoru').value = ''; 
    await loadAllQuestions();
    loadAdminQuestions();
});

// ------------------------------------------------------------
// 10. LEVEL RENDER & EVENT LISTENERLAR
// ------------------------------------------------------------
function renderLevelIndicators(){
    const cont = document.getElementById('levelIndicators');
    cont.innerHTML = '';
    for(let i=1; i<=gameState.maxUnlockedLevel+2; i++){
        const d = document.createElement('div');
        d.className = 'level-badge ' + (i<=gameState.maxUnlockedLevel ? 'active' : 'locked');
        d.innerText = i;
        if(i > gameState.maxUnlockedLevel) d.innerHTML = '<i class="fas fa-lock"></i>';
        d.onclick = () => {
            if(i <= gameState.maxUnlockedLevel){
                gameState.currentLevel = i;
                loadLevelQuestions(i);
                document.getElementById('currentLevelDisplay').innerText = i;
            }
        }
        cont.appendChild(d);
    }
}

// ------------------------------------------------------------
// 11. PWA & DOM LOAD
// ------------------------------------------------------------
let deferredPrompt;
const installBtn = document.getElementById('pwaInstallBtn');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'flex'; 
});

installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    if(outcome === 'accepted') installBtn.style.display = 'none';
});

document.addEventListener('DOMContentLoaded', async () => {
    loadGameState();
    await seedQuestionsIfNeeded();
    await loadAllQuestions();
    updateUI();
    initAvatarSelector();
    initAdminTrigger();
    
    // Intro Eventleri
    document.getElementById('introStartGameBtn').onclick = startGameFromIntro;
    document.getElementById('introSettingsBtn').onclick = () => document.getElementById('introSettingsPanel').classList.toggle('active');
    document.getElementById('saveSettingsBtn').onclick = () => {
        const val = document.getElementById('settingsUsername').value;
        if(val) gameState.username = val;
        saveGameState();
        updateUI();
        document.getElementById('introSettingsPanel').classList.remove('active');
    };
    document.getElementById('closeSettingsBtn').onclick = () => document.getElementById('introSettingsPanel').classList.remove('active');
    
    // Oyun İçi Butonlar
    document.getElementById('nextButton').onclick = onNext;
    document.getElementById('hintButton').onclick = useHint;
    document.getElementById('reportBugBtn').onclick = () => window.location.href = `mailto:admin@example.com?subject=Hata&body=SoruID:${currentQuestion?.id}`;
    
    // Modallar
    document.getElementById('viewLeaderboardBtn').onclick = async () => { await loadLeaderboard(); document.getElementById('leaderboardPanel').classList.add('active'); };
    document.getElementById('leaderboardBtn').onclick = async () => { await loadLeaderboard(); document.getElementById('leaderboardPanel').classList.add('active'); };
    document.getElementById('closeLeaderboardBtn').onclick = () => document.getElementById('leaderboardPanel').classList.remove('active');
    
    document.getElementById('achievementsBtn').onclick = () => { 
        let html=''; Object.keys(gameState.achievements).forEach(k=>{ if(gameState.achievements[k]) html+=`<li>${ACHIEVEMENT_NAMES[k]||k}</li>`; }); 
        document.getElementById('achievementsList').innerHTML = html||'Henüz yok';
        document.getElementById('achievementsPanel').classList.add('active'); 
    };
    document.getElementById('closeAchievementsBtn').onclick = () => document.getElementById('achievementsPanel').classList.remove('active');
    
    document.getElementById('settingsBtn').onclick = () => {
        document.body.classList.toggle('dark-theme');
        gameState.darkMode = !gameState.darkMode;
        saveGameState();
    };
    
    document.getElementById('restartGameBtn').onclick = () => {
        document.getElementById('gameOverModal').classList.add('hidden');
        loadLevelQuestions(gameState.currentLevel); // Seviyeyi tekrar başlat
    };
    
    document.getElementById('closeAdminBtn').onclick = () => document.getElementById('adminPanel').classList.remove('active');
    
    // Bottom Nav Butonları
    document.getElementById('navExitBtn').onclick = exitToIntro;
    document.getElementById('navSoundBtn').onclick = () => {
        soundEnabled = !soundEnabled;
        const icon = document.querySelector('#navSoundBtn i');
        icon.className = soundEnabled ? 'fas fa-volume-up' : 'fas fa-volume-mute';
    };
    document.getElementById('navMascot').onclick = () => {
        Swal.fire({
            title: 'Merhaba! 👋',
            text: 'Ben Nevafil Ayısı! Soruları bil, seviyeleri geç ve lider ol!',
            confirmButtonColor: '#7c3aed'
        });
    };
});

// Service Worker Kaydı
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
