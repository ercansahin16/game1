<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Link Sayfam | Profesyonel Link Paylaşım</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="ios-status-bar">
        <span>9:41</span>
        <span><i class="fas fa-signal"></i> <i class="fas fa-battery-full"></i></span>
    </div>
    
    <div class="user-container">
        <div class="banner-area" id="bannerArea">
            <img id="bannerImage" src="https://via.placeholder.com/1200x300/f3e8ff/d4b8ff?text=Banner" alt="Banner">
        </div>
        
        <div class="profile-section">
            <div class="profile-image-wrapper">
                <img id="profileImage" src="https://via.placeholder.com/120/f3e8ff/d4b8ff?text=Profile" alt="Profil">
            </div>
            <h1 id="userName">Yükleniyor...</h1>
            <p id="userBio" class="user-bio">Yükleniyor...</p>
        </div>
        
        <div class="stats-container" id="statsContainer">
            <div class="stat-item">
                <span class="stat-number" id="totalClicks">0</span>
                <span class="stat-label">Toplam Tıklanma</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="linkCount">0</span>
                <span class="stat-label">Aktif Link</span>
            </div>
        </div>
        
        <div class="links-container" id="linksContainer">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Linkler yükleniyor...</p>
            </div>
        </div>
    </div>
    
    <div class="ios-home-indicator"></div>
    
    <script type="module" src="main.js"></script>
</body>
</html>
