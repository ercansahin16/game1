<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Professional Links</title>
    <style>
        :root {
            --bg-krem: #F5F5DC;
            --bg-bej: #F2E8C6;
            --lavanta: #E6E6FA;
            --gold: #D4AF37;
            --ios-glass: rgba(255, 255, 255, 0.4);
        }
        body {
            background-color: var(--bg-krem);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            font-size: 8px; /* Mikro font */
        }
        .container {
            width: 280px; background: var(--bg-bej); border-radius: 30px; 
            padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 2px solid var(--gold); position: relative;
        }
        .banner {
            width: 100%; height: 60px; border-radius: 20px; 
            background-size: cover; background-position: center;
            background-color: var(--lavanta);
        }
        .profile-img {
            width: 45px; height: 45px; border-radius: 50%;
            border: 2px solid var(--gold); margin: -25px auto 5px;
            display: block; background: #fff;
        }
        .links-container { margin-top: 15px; }
        .link-card {
            background: var(--ios-glass); backdrop-filter: blur(5px);
            margin-bottom: 6px; padding: 6px 12px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #333; font-weight: 600;
            border: 0.5px solid rgba(212, 175, 55, 0.3);
            transition: transform 0.2s; font-size: 9px;
        }
        .link-card:hover { transform: scale(1.02); background: var(--lavanta); }
        /* Gizli Admin Girişi */
        .admin-trigger {
            position: absolute; bottom: 10px; right: 10px;
            width: 10px; height: 10px; opacity: 0.05; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="banner" class="banner"></div>
        <img id="profilePic" class="profile-img" src="" alt="Profile">
        <div id="links" class="links-container">
            </div>
        <a href="admindash.html" class="admin-trigger"></a>
    </div>

    <script type="module">
        import { db } from './firebase-core.js';
        import { collection, onSnapshot, doc, updateDoc, increment, query, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js ";

        const linksDiv = document.getElementById('links');
        
        // Verileri Çek ve Tıklama Sayacını Çalıştır
        onSnapshot(query(collection(db, "links"), orderBy("order")), (snapshot) => {
            linksDiv.innerHTML = '';
            snapshot.forEach((docData) => {
                const link = docData.data();
                const a = document.createElement('a');
                a.className = 'link-card';
                a.href = link.url;
                a.target = "_blank";
                a.innerText = link.title;
                a.onclick = () => {
                    updateDoc(doc(db, "links", docData.id), { clicks: increment(1) });
                };
                linksDiv.appendChild(a);
            });
        });

        // Profil ve Banner ayarlarını çek (Ayrı bir 'settings' koleksiyonundan)
        onSnapshot(doc(db, "settings", "profile"), (doc) => {
            if(doc.exists()){
                document.getElementById('profilePic').src = doc.data().photoURL;
                document.getElementById('banner').style.backgroundImage = `url(${doc.data().bannerURL})`;
            }
        });
    </script>
</body>
</html>
