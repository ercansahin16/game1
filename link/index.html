<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bağlantılarım</title>
  <meta name="theme-color" content="#7c3aed" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#1e1b4b;
      --card:rgba(255,255,255,.12);
      --card2:rgba(255,255,255,.08);
      --text:#ffffff;
      --muted:rgba(255,255,255,.75);
      --line:rgba(255,255,255,.14);
      --accent:#a78bfa;
      --accent2:#c4b5fd;
      --success:#22c55e;
      --danger:#ef4444;
      --warning:#f59e0b;
      --shadow:0 20px 60px rgba(0,0,0,.28);
      --radius:24px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:'Poppins',sans-serif;background:#09090f;color:var(--text)}
    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(124,58,237,.25), transparent 30%),
        radial-gradient(circle at top right, rgba(59,130,246,.18), transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    .banner-wrap{
      position:relative;
      min-height:320px;
      overflow:hidden;
      border-bottom:1px solid var(--line);
    }

    .banner{
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      filter:brightness(.58);
      transform:scale(1.03);
    }

    .banner-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(to bottom, rgba(0,0,0,.15), rgba(0,0,0,.45), rgba(9,9,15,.9));
    }

    .container{
      width:min(1120px, calc(100% - 24px));
      margin:0 auto;
      position:relative;
      z-index:2;
    }

    .hero{
      padding:42px 0 18px;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
    }

    .profile-img{
      width:112px;
      height:112px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid rgba(255,255,255,.85);
      box-shadow:0 12px 35px rgba(0,0,0,.35);
      background:#fff;
    }

    .name{
      margin:18px 0 6px;
      font-size:2rem;
      font-weight:800;
      letter-spacing:.2px;
    }

    .bio{
      margin:0 auto;
      max-width:720px;
      color:var(--muted);
      font-size:1rem;
      line-height:1.7;
    }

    .mini-stats{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      margin-top:18px;
    }

    .chip{
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.1);
      border:1px solid var(--line);
      backdrop-filter:blur(8px);
      font-size:.9rem;
    }

    .content{
      padding:22px 0 40px;
    }

    .toolbar{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:12px;
      align-items:center;
      margin:0 0 18px;
    }

    .searchbox, .selectbox{
      width:100%;
      height:52px;
      border:none;
      outline:none;
      border-radius:18px;
      background:rgba(255,255,255,.11);
      border:1px solid var(--line);
      color:#fff;
      padding:0 16px;
      font-size:.95rem;
      backdrop-filter:blur(8px);
    }

    .selectbox{
      min-width:180px;
      cursor:pointer;
    }

    .toggle-btn{
      height:52px;
      border:none;
      border-radius:18px;
      padding:0 18px;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      color:#1f1147;
      font-weight:700;
      cursor:pointer;
      box-shadow:var(--shadow);
    }

    .section-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin:24px 0 14px;
    }

    .section-title h2{
      margin:0;
      font-size:1.08rem;
      font-weight:700;
    }

    .section-title small{
      color:var(--muted);
    }

    .link-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:16px;
    }

    .link-card{
      position:relative;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      padding:18px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
      transition:.25s transform ease,.25s box-shadow ease,.25s border-color ease;
    }

    .link-card:hover{
      transform:translateY(-4px);
      border-color:rgba(255,255,255,.24);
      box-shadow:0 28px 70px rgba(0,0,0,.35);
    }

    .top-row{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }

    .top-row img{
      width:54px;
      height:54px;
      border-radius:16px;
      object-fit:cover;
      background:#fff;
      flex-shrink:0;
    }

    .top-row .txt{
      min-width:0;
      flex:1;
    }

    .card-title{
      margin:0 0 4px;
      font-size:1.02rem;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .card-sub{
      color:var(--muted);
      font-size:.86rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .desc{
      color:rgba(255,255,255,.88);
      font-size:.93rem;
      line-height:1.65;
      min-height:58px;
      margin:10px 0 14px;
    }

    .tags{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:14px;
    }

    .tag{
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
      font-size:.76rem;
      color:#eee;
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .go-btn, .copy-btn{
      flex:1;
      height:46px;
      border:none;
      border-radius:15px;
      cursor:pointer;
      font-weight:700;
      font-size:.92rem;
    }

    .go-btn{
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      color:#1f1147;
    }

    .copy-btn{
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid var(--line);
    }

    .badge{
      position:absolute;
      top:14px;
      right:14px;
      padding:7px 10px;
      border-radius:999px;
      font-size:.72rem;
      font-weight:700;
      border:1px solid var(--line);
      background:rgba(255,255,255,.08);
    }

    .featured{
      border:1px solid rgba(196,181,253,.55);
      box-shadow:0 20px 65px rgba(124,58,237,.18);
    }

    .empty{
      text-align:center;
      padding:38px 18px;
      border:1px dashed rgba(255,255,255,.22);
      border-radius:24px;
      color:var(--muted);
      background:rgba(255,255,255,.05);
    }

    .footer{
      text-align:center;
      color:var(--muted);
      font-size:.88rem;
      padding:16px 0 35px;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%) translateY(20px);
      background:#111827;
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      padding:12px 16px;
      border-radius:14px;
      box-shadow:var(--shadow);
      opacity:0;
      pointer-events:none;
      transition:.25s;
      z-index:9999;
      max-width:calc(100% - 24px);
      text-align:center;
      font-size:.92rem;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .view-switch{
      display:flex;
      gap:10px;
      justify-content:center;
      margin:18px 0 6px;
    }

    .view-switch button{
      border:none;
      border-radius:999px;
      height:42px;
      padding:0 16px;
      cursor:pointer;
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid var(--line);
    }

    .list-mode .link-grid{
      grid-template-columns:1fr;
    }

    @media (max-width: 860px){
      .toolbar{
        grid-template-columns:1fr;
      }
      .name{font-size:1.65rem}
      .banner-wrap{min-height:280px}
    }
  </style>
</head>
<body>
  <div class="banner-wrap">
    <div class="banner" id="bannerEl"></div>
    <div class="banner-overlay"></div>

    <div class="container">
      <div class="hero">
        <img id="profileImg" class="profile-img" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=500&auto=format&fit=crop" alt="Profil">
        <h1 class="name" id="profileName">Bağlantılarım</h1>
        <p class="bio" id="profileBio">Tüm projelerime, sayfalarıma ve özel bağlantılarıma bu sayfadan kolayca ulaşabilirsin.</p>

        <div class="mini-stats" id="statsWrap">
          <div class="chip" id="totalLinksChip">0 link</div>
          <div class="chip" id="featuredChip">0 öne çıkan</div>
          <div class="chip" id="categoryChip">0 kategori</div>
        </div>

        <div class="view-switch">
          <button id="gridBtn">Kart görünümü</button>
          <button id="listBtn">Liste görünümü</button>
        </div>
      </div>
    </div>
  </div>

  <div class="container content" id="pageRoot">
    <div class="toolbar">
      <input type="text" class="searchbox" id="searchInput" placeholder="Link ara... başlık, açıklama, etiket..." />
      <select class="selectbox" id="categoryFilter">
        <option value="">Tüm kategoriler</option>
      </select>
      <button class="toggle-btn" id="featuredOnlyBtn">Sadece öne çıkanlar</button>
    </div>

    <div class="section-title">
      <h2>Bağlantılar</h2>
      <small id="resultInfo">Yükleniyor...</small>
    </div>

    <div class="link-grid" id="linkGrid"></div>

    <div class="footer">
      Bu sayfa dinamik olarak yönetilmektedir.
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { db } from "./firebase-core.js";
    import {
      collection,
      doc,
      getDoc,
      getDocs,
      updateDoc,
      increment,
      orderBy,
      query
    } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const DEFAULT_BANNER = "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1600&auto=format&fit=crop";
    const DEFAULT_PROFILE = "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?q=80&w=500&auto=format&fit=crop";

    const bannerEl = document.getElementById("bannerEl");
    const profileImg = document.getElementById("profileImg");
    const profileName = document.getElementById("profileName");
    const profileBio = document.getElementById("profileBio");
    const linkGrid = document.getElementById("linkGrid");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    const featuredOnlyBtn = document.getElementById("featuredOnlyBtn");
    const resultInfo = document.getElementById("resultInfo");
    const toast = document.getElementById("toast");
    const totalLinksChip = document.getElementById("totalLinksChip");
    const featuredChip = document.getElementById("featuredChip");
    const categoryChip = document.getElementById("categoryChip");
    const pageRoot = document.getElementById("pageRoot");
    const gridBtn = document.getElementById("gridBtn");
    const listBtn = document.getElementById("listBtn");

    let allLinks = [];
    let onlyFeatured = false;
    let currentView = localStorage.getItem("linkpage_view") || "grid";

    function showToast(msg){
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function normalizeText(t){
      return (t || "").toString().toLocaleLowerCase("tr");
    }

    function escapeHtml(str=""){
      return str
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;");
    }

    async function loadProfileSettings(){
      try{
        const snap = await getDoc(doc(db, "siteSettings", "main"));
        if(snap.exists()){
          const data = snap.data();
          profileName.textContent = data.siteTitle || "Bağlantılarım";
          profileBio.textContent = data.siteBio || "Tüm projelerime, sayfalarıma ve özel bağlantılarıma buradan ulaşabilirsin.";
          profileImg.src = data.profileImage || DEFAULT_PROFILE;
          bannerEl.style.backgroundImage = `url('${data.bannerImage || DEFAULT_BANNER}')`;
          document.title = data.browserTitle || data.siteTitle || "Bağlantılarım";
        } else {
          bannerEl.style.backgroundImage = `url('${DEFAULT_BANNER}')`;
          profileImg.src = DEFAULT_PROFILE;
        }
      } catch(err){
        console.error(err);
        bannerEl.style.backgroundImage = `url('${DEFAULT_BANNER}')`;
        profileImg.src = DEFAULT_PROFILE;
      }
    }

    async function loadLinks(){
      try{
        const qRef = query(collection(db, "links"), orderBy("order", "asc"));
        const snap = await getDocs(qRef);
        allLinks = snap.docs.map(d => ({ id:d.id, ...d.data() }));
        renderLinks();
      } catch(err){
        console.error(err);
        linkGrid.innerHTML = '<div class="empty">Linkler yüklenirken bir hata oluştu.</div>';
      }
    }

    function buildCategories(data){
      const cats = [...new Set(data.map(x => (x.category || "").trim()).filter(Boolean))];
      categoryFilter.innerHTML = `<option value="">Tüm kategoriler</option>`;
      cats.forEach(cat => {
        const op = document.createElement("option");
        op.value = cat;
        op.textContent = cat;
        categoryFilter.appendChild(op);
      });
      categoryChip.textContent = `${cats.length} kategori`;
    }

    function updateStats(filtered){
      totalLinksChip.textContent = `${allLinks.filter(x => x.visible !== false).length} link`;
      featuredChip.textContent = `${allLinks.filter(x => x.visible !== false && x.featured).length} öne çıkan`;
      resultInfo.textContent = `${filtered.length} sonuç gösteriliyor`;
    }

    function renderLinks(){
      const term = normalizeText(searchInput.value.trim());
      const selectedCat = categoryFilter.value;
      const visibleLinks = allLinks.filter(x => x.visible !== false);

      buildCategories(visibleLinks);

      let filtered = visibleLinks.filter(item => {
        const textBlob = normalizeText(
          `${item.title || ""} ${item.description || ""} ${item.category || ""} ${(item.tags || []).join(" ")}`
        );

        const matchText = !term || textBlob.includes(term);
        const matchCategory = !selectedCat || item.category === selectedCat;
        const matchFeatured = !onlyFeatured || !!item.featured;

        return matchText && matchCategory && matchFeatured;
      });

      updateStats(filtered);

      if(!filtered.length){
        linkGrid.innerHTML = `<div class="empty">Aramana uygun link bulunamadı.</div>`;
        return;
      }

      linkGrid.innerHTML = filtered.map(item => `
        <div class="link-card ${item.featured ? "featured" : ""}">
          ${item.category ? `<div class="badge">${escapeHtml(item.category)}</div>` : ""}
          <div class="top-row">
            <img src="${escapeHtml(item.icon || DEFAULT_PROFILE)}" alt="${escapeHtml(item.title || "Link")}">
            <div class="txt">
              <div class="card-title">${escapeHtml(item.title || "Başlıksız link")}</div>
              <div class="card-sub">${escapeHtml(item.url || "")}</div>
            </div>
          </div>

          <div class="desc">${escapeHtml(item.description || "Açıklama eklenmemiş.")}</div>

          <div class="tags">
            ${(item.tags || []).slice(0,6).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
            ${item.featured ? `<span class="tag">Öne çıkan</span>` : ""}
            ${item.clickCount ? `<span class="tag">${item.clickCount} tıklama</span>` : ""}
          </div>

          <div class="actions">
            <button class="go-btn" data-url="${escapeHtml(item.url || "#")}" data-id="${item.id}">Git</button>
            <button class="copy-btn" data-copy="${escapeHtml(item.url || "")}">Kopyala</button>
          </div>
        </div>
      `).join("");
    }

    async function increaseClickCount(id){
      try{
        const ref = doc(db, "links", id);
        await updateDoc(ref, { clickCount: increment(1) });
      } catch(err){
        console.error("Sayaç artırma hatası:", err);
      }
    }

    linkGrid.addEventListener("click", async (e) => {
      const goBtn = e.target.closest(".go-btn");
      const copyBtn = e.target.closest(".copy-btn");

      if(goBtn){
        const url = goBtn.dataset.url;
        const id = goBtn.dataset.id;
        await increaseClickCount(id);
        window.open(url, "_blank");
      }

      if(copyBtn){
        const text = copyBtn.dataset.copy;
        try{
          await navigator.clipboard.writeText(text);
          showToast("Link panoya kopyalandı.");
        } catch {
          showToast("Kopyalama başarısız oldu.");
        }
      }
    });

    searchInput.addEventListener("input", renderLinks);
    categoryFilter.addEventListener("change", renderLinks);

    featuredOnlyBtn.addEventListener("click", () => {
      onlyFeatured = !onlyFeatured;
      featuredOnlyBtn.textContent = onlyFeatured ? "Tüm linkler" : "Sadece öne çıkanlar";
      renderLinks();
    });

    function applyView(){
      if(currentView === "list"){
        pageRoot.classList.add("list-mode");
      }else{
        pageRoot.classList.remove("list-mode");
      }
    }

    gridBtn.addEventListener("click", () => {
      currentView = "grid";
      localStorage.setItem("linkpage_view", currentView);
      applyView();
    });

    listBtn.addEventListener("click", () => {
      currentView = "list";
      localStorage.setItem("linkpage_view", currentView);
      applyView();
    });

    applyView();
    await loadProfileSettings();
    await loadLinks();
  </script>
</body>
</html>
