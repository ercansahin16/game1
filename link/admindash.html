<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        /* Mikro Tasarım Ayarları */
        body { font-size: 8px; background: #FAF9F6; padding: 20px; font-family: sans-serif; }
        .panel { max-width: 400px; margin: auto; background: white; border-radius: 15px; padding: 10px; border: 1px solid #ddd; }
        input, button { font-size: 8px; padding: 4px; margin: 2px 0; border-radius: 5px; border: 1px solid #ccc; width: 100%; box-sizing: border-box;}
        .link-item { 
            background: #fdfdfd; border: 0.5px solid #eee; margin: 4px 0; padding: 5px; 
            display: flex; align-items: center; cursor: grab; border-radius: 5px;
        }
        .stats { color: var(--gold); font-weight: bold; margin-left: auto; }
        .avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 10px 0; }
        .avatar-option { width: 30px; height: 30px; cursor: pointer; border-radius: 50%; border: 1px solid transparent; }
        .avatar-option.selected { border-color: gold; transform: scale(1.1); }
        .password-container { position: relative; }
        .toggle-pw { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 7px; }
    </style>
</head>
<body>
    <div id="login-zone" class="panel">
        <h3>Admin Girişi</h3>
        <div class="password-container">
            <input type="password" id="adminPass" placeholder="Şifre">
            <span class="toggle-pw" onclick="togglePass()">👁️</span>
        </div>
        <button onclick="checkAuth()">Giriş Yap</button>
    </div>

    <div id="admin-content" class="panel" style="display:none;">
        <h3>Link Yönetimi (Sürükle Bırak)</h3>
        <div id="link-list"></div>
        <hr>
        <h3>Yeni Link Ekle</h3>
        <input type="text" id="newTitle" placeholder="Başlık (örn: Instagram)">
        <input type="text" id="newUrl" placeholder="URL">
        <button onclick="addNewLink()">Ekle</button>
        <hr>
        <h3>Profil Karakteri Seç (25 Adet)</h3>
        <div id="avatar-picker" class="avatar-grid"></div>
        <button onclick="saveProfile()">Ayarları Kaydet</button>
    </div>

    <script type="module">
        import { db } from './firebase-core.js';
        import { collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js ";

        // 1. Şifre Göster/Gizle Fonksiyonu
        window.togglePass = () => {
            const p = document.getElementById('adminPass');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        // 2. Basit Auth (Daha güvenli hale getirilebilir)
        window.checkAuth = () => {
            if(document.getElementById('adminPass').value === "1234") { // Şifreyi buradan değiştirebilirsin
                document.getElementById('login-zone').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadAdminData();
            }
        }

        // 3. Verileri Yükle & Sürükle Bırak
        function loadAdminData() {
            const list = document.getElementById('link-list');
            onSnapshot(query(collection(db, "links"), orderBy("order")), (snap) => {
                list.innerHTML = '';
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `
                        <div class="link-item" data-id="${d.id}">
                            <span>☰ ${data.title}</span>
                            <span class="stats">${data.clicks || 0} Tık</span>
                            <button onclick="deleteLink('${d.id}')" style="width:20px; background:red; color:white; border:none; margin-left:5px;">X</button>
                        </div>
                    `;
                });
            });

            // SortableJS Entegrasyonu
            new Sortable(list, {
                animation: 150,
                onEnd: async function() {
                    const items = list.querySelectorAll('.link-item');
                    items.forEach((item, index) => {
                        updateDoc(doc(db, "links", item.getAttribute('data-id')), { order: index });
                    });
                }
            });
        }

        // 4. Çizgi Film Karakterleri (25 Adet Placeholder URL)
        const picker = document.getElementById('avatar-picker');
        for(let i=1; i<=25; i++) {
            const img = document.createElement('img');
            img.src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${i}`; // API ile çizgi film karakterleri
            img.className = 'avatar-option';
            img.onclick = () => {
                document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
                img.classList.add('selected');
                window.selectedAvatar = img.src;
            };
            picker.appendChild(img);
        }

        window.addNewLink = async () => {
            await addDoc(collection(db, "links"), {
                title: document.getElementById('newTitle').value,
                url: document.getElementById('newUrl').value,
                order: 99,
                clicks: 0
            });
        }
        
        window.deleteLink = async (id) => { if(confirm('Silinsin mi?')) await deleteDoc(doc(db, "links", id)); }
    </script>
</body>
</html>
