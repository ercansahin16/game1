<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Panel | Link Yönetimi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sortablejs@latest/css/sortable.min.css">
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-crown"></i> Admin Panel</h1>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Çıkış</button>
        </div>
        
        <div id="loginSection" class="login-section">
            <div class="glass-card">
                <h2><i class="fas fa-lock"></i> Admin Girişi</h2>
                <div class="password-input-wrapper">
                    <input type="password" id="adminPassword" placeholder="Admin Şifresi" class="password-input">
                    <button class="toggle-password" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <button id="loginBtn" class="btn-primary">Giriş Yap</button>
                <p class="hint-text">İpucu: admin123</p>
            </div>
        </div>
        
        <div id="adminContent" style="display: none;">
            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="profile"><i class="fas fa-user"></i> Profil</button>
                <button class="tab-btn" data-tab="links"><i class="fas fa-link"></i> Linkler</button>
                <button class="tab-btn" data-tab="analytics"><i class="fas fa-chart-line"></i> Analitik</button>
                <button class="tab-btn" data-tab="avatars"><i class="fas fa-images"></i> Avatarlar</button>
                <button class="tab-btn" data-tab="settings"><i class="fas fa-cog"></i> Ayarlar</button>
            </div>
            
            <!-- Profil Sekmesi -->
            <div class="tab-content active" id="profileTab">
                <div class="form-card">
                    <h3><i class="fas fa-user-circle"></i> Profil Bilgileri</h3>
                    <div class="form-group">
                        <label>Kullanıcı Adı</label>
                        <input type="text" id="userNameInput" class="form-control" placeholder="Kullanıcı adı">
                    </div>
                    <div class="form-group">
                        <label>Biyografi</label>
                        <textarea id="userBioInput" rows="3" class="form-control" placeholder="Kendinizi tanıtın..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Profil Resmi</label>
                        <div class="avatar-selection">
                            <div class="current-avatar" id="currentAvatarPreview">
                                <img id="currentAvatarImg" src="" alt="Mevcut Avatar">
                            </div>
                            <button class="btn-secondary" id="openAvatarGallery"><i class="fas fa-images"></i> Avatar Seç</button>
                            <button class="btn-secondary" id="uploadAvatarBtn"><i class="fas fa-upload"></i> Yükle</button>
                            <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Banner Resmi</label>
                        <div class="banner-upload-area">
                            <img id="currentBannerImg" src="" alt="Mevcut Banner">
                            <button class="btn-secondary" id="uploadBannerBtn"><i class="fas fa-upload"></i> Banner Yükle</button>
                            <input type="file" id="bannerUpload" accept="image/*" style="display: none;">
                        </div>
                    </div>
                    <button id="saveProfileBtn" class="btn-primary"><i class="fas fa-save"></i> Profili Kaydet</button>
                </div>
            </div>
            
            <!-- Linkler Sekmesi -->
            <div class="tab-content" id="linksTab">
                <div class="form-card">
                    <h3><i class="fas fa-plus-circle"></i> Yeni Link Ekle</h3>
                    <div class="form-group">
                        <input type="text" id="newLinkTitle" class="form-control" placeholder="Link Başlığı (örn: Instagram)">
                    </div>
                    <div class="form-group">
                        <input type="url" id="newLinkUrl" class="form-control" placeholder="Link URL (örn: https://instagram.com/...)">
                    </div>
                    <div class="form-group">
                        <select id="newLinkIcon" class="form-control">
                            <option value="fab fa-instagram">Instagram</option>
                            <option value="fab fa-twitter">Twitter</option>
                            <option value="fab fa-youtube">YouTube</option>
                            <option value="fab fa-tiktok">TikTok</option>
                            <option value="fab fa-facebook">Facebook</option>
                            <option value="fab fa-linkedin">LinkedIn</option>
                            <option value="fab fa-github">GitHub</option>
                            <option value="fas fa-globe">Website</option>
                            <option value="fas fa-envelope">Email</option>
                            <option value="fab fa-whatsapp">WhatsApp</option>
                        </select>
                    </div>
                    <button id="addLinkBtn" class="btn-primary"><i class="fas fa-plus"></i> Link Ekle</button>
                </div>
                
                <div class="links-management">
                    <h3><i class="fas fa-list"></i> Mevcut Linkler <span class="hint">(Sürükle-bırak ile sıralayın)</span></h3>
                    <div id="sortableLinks" class="sortable-links"></div>
                </div>
            </div>
            
            <!-- Analitik Sekmesi -->
            <div class="tab-content" id="analyticsTab">
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-chart-simple"></i>
                        <h3 id="totalClicksStat">0</h3>
                        <p>Toplam Tıklanma</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-link"></i>
                        <h3 id="totalLinksStat">0</h3>
                        <p>Aktif Link</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-eye"></i>
                        <h3 id="avgClicksStat">0</h3>
                        <p>Ortalama Tıklanma</p>
                    </div>
                </div>
                <div class="analytics-chart">
                    <h3><i class="fas fa-chart-bar"></i> Link Performansı</h3>
                    <div id="analyticsList" class="analytics-list"></div>
                </div>
            </div>
            
            <!-- Avatarlar Sekmesi -->
            <div class="tab-content" id="avatarsTab">
                <div class="form-card">
                    <h3><i class="fas fa-smile"></i> Çizgi Film Avatar Galerisi</h3>
                    <div class="avatar-gallery" id="avatarGallery"></div>
                    <button id="refreshAvatarsBtn" class="btn-secondary"><i class="fas fa-sync"></i> Yenile</button>
                </div>
            </div>
            
            <!-- Ayarlar Sekmesi -->
            <div class="tab-content" id="settingsTab">
                <div class="form-card">
                    <h3><i class="fas fa-key"></i> Güvenlik Ayarları</h3>
                    <div class="form-group">
                        <label>Admin Şifresini Değiştir</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="newPassword" class="form-control" placeholder="Yeni şifre">
                            <button class="toggle-password" id="toggleNewPassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <button id="changePasswordBtn" class="btn-primary mt-2">Şifreyi Güncelle</button>
                    </div>
                    
                    <hr>
                    
                    <h3><i class="fas fa-database"></i> Veri Yönetimi</h3>
                    <button id="exportDataBtn" class="btn-secondary"><i class="fas fa-download"></i> Verileri Dışa Aktar</button>
                    <button id="resetAllBtn" class="btn-danger"><i class="fas fa-trash-alt"></i> Tüm Verileri Sıfırla</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toastMessage" class="toast"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script type="module" src="admin.js"></script>
</body>
</html>
